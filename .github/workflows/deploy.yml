name: Build and deploy Zola site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# Native Node.js 24 opt-in (best practice thay vì FORCE env): mỗi job
# setup-node@v4 explicit + ACTIONS_RUNNER_HOOK_NODE_PATH ép runner ưu
# tiên Node 24 path cho mọi JS action sau đó.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Zola
        run: |
          curl -sLO https://github.com/getzola/zola/releases/download/v0.22.1/zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz
          sudo mv zola /usr/local/bin/

      - name: Build site
        env:
          # GITHUB_TOKEN tự inject sẵn trong workflow — không cần setup secret thủ công.
          # Quota: 1000 req/h cho GITHUB_TOKEN. Build chỉ gọi 1 req nên dư xa.
          # Template (base.html) đọc env này để fetch commit qua load_data ở build-time,
          # bake thẳng vào HTML → user visit = 0 API call, không bao giờ dính quota 60/h.
          ZOLA_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: zola build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
