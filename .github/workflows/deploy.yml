name: Build and deploy Zola site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      # Cache Zola binary to speed up subsequent builds
      - name: Cache Zola
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/zola
          key: zola-${{ runner.os }}-${{ hashFiles('**/zola-version.txt') }}
          restore-keys: |
            zola-${{ runner.os }}-

      - name: Install Zola
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          curl -sLO https://github.com/getzola/zola/releases/download/v0.22.1/zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz
          sudo mv zola /usr/local/bin/
          zola --version > zola-version.txt

      - name: Build site
        env:
          ZOLA_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export ZOLA_VERSION="$(zola --version | awk '{print $2}')"
          echo "🚀 Building with Zola $ZOLA_VERSION"
          zola build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
