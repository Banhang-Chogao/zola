name: Build and deploy Zola site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Deploy định kỳ mỗi 6h để publish data bot refresh (dashboard/trends/…) mà
    # KHÔNG cần mỗi lần bot refresh tự dispatch deploy → giảm mạnh số deploy run.
    - cron: '0 */6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy-production
  # false: queue deploy thay vì cancel để đảm bảo latest main commit luôn được deploy.
  # REASON: PR merge dồn dập có thể huỷ run cũ, khiến latest main commit không lên
  # production (V21 — "Merged is not live"). Build cache + 6h schedule cron giảm
  # Pages API quota pressure. Queuing deploy là quy trình chuẩn GitHub Pages.
  # (Nếu cần nhanh hơn: dùng deploy-guard.yml để verify + retry, không cancel build.)
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Preflight: classify changed files + check queue ───────────────────
  # Smart Deploy Queue gate. If the commit only touches LOW_VALUE generated
  # data (dashboards, reports, stats, heartbeat) AND there's already a
  # production deploy queued or in_progress, skip this run to preserve quota.
  # IMPORTANT commits (content, templates, config, hotfix) always proceed.
  preflight:
    runs-on: ubuntu-latest
    outputs:
      decision: ${{ steps.smart_queue.outputs.decision }}
      reason: ${{ steps.smart_queue.outputs.reason }}
      classification: ${{ steps.smart_queue.outputs.classification }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Smart Deploy Queue — preflight check
        id: smart_queue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
        run: python3 scripts/ci_smart_deploy_queue.py

      - name: Log preflight result
        run: |
          echo "🧠 Smart Deploy Queue: ${{ steps.smart_queue.outputs.decision }}"
          echo "   ${{ steps.smart_queue.outputs.reason }}"

      - name: Skip notification
        if: steps.smart_queue.outputs.decision == 'skip_low_value'
        run: |
          echo "✅ Build skipped: ${{ steps.smart_queue.outputs.reason }}"
          echo "   LOW_VALUE data/report commit while deploy is already queued."
          echo "   The data will be included in the next deploy run."

  # ── Build ─────────────────────────────────────────────────────────────
  build:
    needs: preflight
    if: needs.preflight.outputs.decision != 'skip_low_value'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Zola
        run: |
          curl -sLO https://github.com/getzola/zola/releases/download/v0.22.1/zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz
          sudo mv zola /usr/local/bin/

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build social OG cover images (SVG → .og.webp)
        run: |
          pip install -r scripts/requirements-og-images.txt
          python3 scripts/build_og_images.py

      - name: Build feed pagination anchors
        run: python3 scripts/build_feed_pagination.py

      - name: Build reference index
        run: python3 scripts/build_references.py

      - name: Build Google Rank sidebar data
        run: python3 scripts/build_google_rank.py

      - name: Build GitHub Activity data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/build_github_activity.py

      - name: Build GitHub Profile Badges data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/build_github_profile_badges.py

      - name: SEO Rank auto-fix report (scan only)
        run: python3 scripts/seo-rank-autofix.py --scan-only

      - name: Fetch Google Trends VN (hot search sidebar)
        run: python3 scripts/fetch_google_trends.py --limit 25

      - name: Publish premium content (paywall off — full body for build)
        run: python3 scripts/paywall_prepare_build.py --strip

      - name: Build theme log (rollback milestones from git)
        # Sinh data/theme-log.json từ git history thật trước zola build. Script
        # tự bảo vệ: nếu checkout shallow (history thiếu) → GIỮ NGUYÊN file đã
        # commit, không ghi đè (không bao giờ fail hard).
        run: python3 scripts/theme_audit.py

      - name: Build production snapshot (Changelog ?? panel)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 scripts/fetch_deploy_monitor.py || true
          python3 scripts/build_prod_snapshot.py

      - name: Audit MoMo links across repo
        run: python3 scripts/audit_momo_links.py

      - name: Build MoMo public usage report (for admin modal UX)
        run: python3 scripts/audit_momo_public_usage.py

      - name: Build site
        env:
          ZOLA_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export ZOLA_VERSION="$(zola --version | awk '{print $2}')"
          export ZOLA_BUILD_SHA="$(git rev-parse --short=7 HEAD)"
          echo "Building with Zola $ZOLA_VERSION @ commit $ZOLA_BUILD_SHA"
          zola build

      - name: Enforce custom domain CNAME (deterministic — không phụ thuộc Zola copy static/CNAME)
        run: |
          printf 'seomoney.org\n' > public/CNAME
          test "$(cat public/CNAME)" = "seomoney.org"
          echo "public/CNAME = $(cat public/CNAME)"

      - name: Setup GitHub Pages (with exponential backoff retry)
        id: configure_pages
        continue-on-error: true
        run: |
          set +e

          echo "🔧 Configuring GitHub Pages with exponential backoff retry..."
          echo "   (prevents API rate limit exceeded errors during batch deploys)"
          echo ""

          MAX_RETRIES=3
          BACKOFF=10
          ATTEMPT=1
          SUCCESS=0

          while [ $ATTEMPT -le $MAX_RETRIES ]; do
            echo "[Attempt $ATTEMPT/$MAX_RETRIES] Calling Pages API..."

            # Call GitHub Pages configuration API
            RESPONSE=$(gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              /repos/${{ github.repository }}/pages \
              -f 'build_type=workflow' \
              -f 'source={branch: "main", path: "/"}' \
              2>&1)

            PAGES_STATUS=$?

            if [ $PAGES_STATUS -eq 0 ]; then
              echo "✅ GitHub Pages configured successfully"
              SUCCESS=1
              break
            fi

            # Check if error is rate-limit related
            if echo "$RESPONSE" | grep -qi "rate limit\|api.*quota\|api.*limit"; then
              if [ $ATTEMPT -lt $MAX_RETRIES ]; then
                echo "⚠️  Rate limited. Waiting ${BACKOFF}s before retry..."
                echo "   Error: $(echo "$RESPONSE" | head -1)"
                sleep $BACKOFF
                BACKOFF=$((BACKOFF * 2))  # Exponential backoff: 10→20→40
                ATTEMPT=$((ATTEMPT + 1))
                continue
              else
                echo "❌ FAILED: Pages API rate limited after $MAX_RETRIES attempts"
                echo "   Full response: $RESPONSE"
                break
              fi
            fi

            # Pages site đã tồn tại (409 already exists) → idempotent, coi như thành
            # công (build_type=workflow đã set sẵn) thay vì báo lỗi giả mỗi deploy.
            if echo "$RESPONSE" | grep -qi "already exists\|name already\|HTTP 409"; then
              echo "✅ GitHub Pages already configured (idempotent) — nothing to change"
              SUCCESS=1
              break
            fi

            # Non-rate-limit error (auth, bad request, etc.) → fail immediately
            echo "❌ FAILED: Non-recoverable error"
            echo "   Error: $RESPONSE"
            break
          done

          if [ $SUCCESS -eq 1 ]; then
            exit 0
          else
            echo ""
            echo "⏳ GitHub Pages API rate limit will reset in ~30 minutes"
            echo "ℹ️  Build artifacts are still available and will deploy on next run"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      # Lấy URL từ lần deploy nào thành công (||  trả operand truthy đầu tiên).
      url: ${{ steps.deploy_attempt_1.outputs.page_url || steps.deploy_attempt_2.outputs.page_url || steps.deploy_attempt_3.outputs.page_url }}
    steps:
      # V5 (mở rộng) — "API rate limit exceeded for installation" KHÔNG chỉ xảy ra ở
      # configure-pages (build job) mà còn ở chính bước tạo Pages deployment của
      # actions/deploy-pages (createPagesDeployment → 403). Action chính thức KHÔNG
      # tự retry call này → "bão deploy" (nhiều PR/bot push dồn dập làm cạn quota API
      # theo giờ của installation) khiến deploy job đỏ dù build PASS.
      #
      # FIX: tự retry với exponential backoff (0 → 60s → 120s), CHỈ dùng action chính
      # thức (không thêm dependency bên thứ ba). Mỗi attempt xin OIDC token mới nên
      # an toàn lặp lại; chỉ tạo deployment khi quota đã hồi. Hai attempt đầu
      # continue-on-error (nuốt lỗi để còn retry); attempt cuối KHÔNG nuốt lỗi → lỗi
      # thật vẫn nổi lên, không che giấu deploy hỏng vĩnh viễn.
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy_attempt_1
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Backoff before attempt 2 (Pages API rate limit)
        if: steps.deploy_attempt_1.outcome == 'failure'
        run: |
          echo "⚠️  Deploy attempt 1 failed (thường do Pages API rate limit). Chờ 60s rồi thử lại…"
          sleep 60

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy_attempt_2
        if: steps.deploy_attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Backoff before attempt 3 (Pages API rate limit)
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        run: |
          echo "⚠️  Deploy attempt 2 failed. Chờ 120s rồi thử lần cuối…"
          sleep 120

      - name: Deploy to GitHub Pages (attempt 3, final)
        id: deploy_attempt_3
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        uses: actions/deploy-pages@v5
