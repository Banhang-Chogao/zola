name: Build and deploy Zola site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Deploy định kỳ mỗi 6h để publish data bot refresh (dashboard/trends/…) mà
    # KHÔNG cần mỗi lần bot refresh tự dispatch deploy → giảm mạnh số deploy run.
    - cron: '0 */6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # ZERO_BARRIER_DEPLOY_QUEUE: serialize production deploys FIFO — 1 pipeline at a
  # time. cancel-in-progress:false → queue, never cancel → no parallel deploy spam,
  # no Pages-API rate-limit burst (configure-pages). Next deploy starts after the
  # previous reaches a terminal state. (Supersedes V5 cancel-on-storm.)
  group: production-deploy
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets.GH_GITHUB_COM_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ZOLA_VERSION: '0.22.1'
  PIP_CACHE_DIR: ~/.cache/pip

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache Zola binary
        id: cache-zola
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/zola
          key: ${{ runner.os }}-zola-${{ env.ZOLA_VERSION }}

      - name: Install Zola
        if: steps.cache-zola.outputs.cache-hit != 'true'
        run: |
          curl -sLO https://github.com/getzola/zola/releases/download/v${{ env.ZOLA_VERSION }}/zola-v${{ env.ZOLA_VERSION }}-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf zola-v${{ env.ZOLA_VERSION }}-x86_64-unknown-linux-gnu.tar.gz
          sudo mv zola /usr/local/bin/
          zola --version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          token: ${{ secrets.GH_GITHUB_COM_TOKEN }}

      # DNS Vaccine gate — blocks the deploy only on deterministic repo drift
      # (base_url host ≠ static/CNAME). Live DNS is monitored separately by
      # dns-vaccine.yml; this gate never touches the network, so it cannot flake.
      - name: DNS Vaccine gate (repo drift only)
        run: python3 scripts/dns_vaccine.py --offline --gate

      # GSC preflight gate — FAIL the deploy unless GSC_PROPERTY_URL is the
      # canonical domain property (sc-domain:seomoney.org). The offline gate needs
      # no network/wheels; when OAuth creds are present it additionally verifies
      # sites.list permission, sitemap registration and a 7d Search Analytics
      # smoke fetch. Never logs credentials.
      - name: GSC property preflight (deploy gate)
        env:
          GSC_PROPERTY_URL: ${{ secrets.GSC_PROPERTY_URL }}
          GSC_REFRESH_TOKEN: ${{ secrets.GSC_REFRESH_TOKEN }}
          GSC_CLIENT_ID: ${{ secrets.GSC_CLIENT_ID }}
          GSC_CLIENT_SECRET: ${{ secrets.GSC_CLIENT_SECRET }}
        run: |
          if [ -n "${GSC_REFRESH_TOKEN}" ] && [ -n "${GSC_CLIENT_ID}" ] && [ -n "${GSC_CLIENT_SECRET}" ]; then
            pip install --quiet google-api-python-client==2.169.0 google-auth==2.40.2
          fi
          python3 scripts/gsc_preflight.py

      - name: Build social OG cover images (SVG → .og.webp)
        run: |
          pip install -r scripts/requirements-og-images.txt
          python3 scripts/build_og_images.py

      - name: Build feed pagination anchors
        run: python3 scripts/build_feed_pagination.py

      - name: Build reference index
        run: python3 scripts/build_references.py

      - name: Build VIPZone picker catalog
        run: python3 scripts/build_vipzone_picker_catalog.py

      - name: Build Google Rank sidebar data
        run: python3 scripts/build_google_rank.py

      - name: Build SEO Reality Check sidebar data
        run: python3 scripts/build_seo_reality.py

      - name: Build GitHub Activity data
        env:
          GITHUB_TOKEN: ${{ secrets.GH_GITHUB_COM_TOKEN }}
        run: python3 scripts/build_github_activity.py

      - name: Build GitHub Profile Badges data
        env:
          GITHUB_TOKEN: ${{ secrets.GH_GITHUB_COM_TOKEN }}
        run: python3 scripts/build_github_profile_badges.py

      - name: Build THEODOI8 LIVE banner report
        env:
          GITHUB_TOKEN: ${{ secrets.GH_GITHUB_COM_TOKEN }}
        run: python3 scripts/build_theodoi8_report.py

      - name: Build Open PR Monitor data (gh pr list → static/data/open-prs.json)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_GITHUB_COM_TOKEN }}
        run: python3 scripts/build_open_prs.py

      - name: SEO Rank auto-fix report (scan only)
        run: python3 scripts/seo-rank-autofix.py --scan-only

      - name: Fetch Google Trends VN (hot search sidebar)
        run: python3 scripts/fetch_google_trends.py --limit 25

      - name: Generate deployment status
        run: |
          SHA_SHORT=$(git rev-parse --short=7 HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          jq -n \
            --arg status "success" \
            --arg ts "$NOW" \
            --arg deploy_time "$NOW" \
            --arg sha "$SHA_SHORT" \
            --arg msg "$COMMIT_MSG" \
            --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{status: $status, timestamp: $ts, deploy_time: $deploy_time, commit_sha: $sha, commit_message: $msg, run_url: $url, duration_seconds: 0, health: "green"}' \
            > data/deployment-status.json

      - name: Build site
        timeout-minutes: 20
        env:
          # Dùng PAT (5000 req/h) thay vì GITHUB_TOKEN (1000 req/h) để tránh
          # rate-limit khi template gọi GitHub API commits (load_data).
          ZOLA_GH_TOKEN: ${{ secrets.GH_GITHUB_COM_TOKEN }}
          # Google AdSense publisher id (ca-pub-…). Để trống nếu chưa duyệt →
          # base.html bỏ qua loader. Đặt secret ADSENSE_CLIENT để bật quảng cáo.
          ADSENSE_CLIENT: ${{ secrets.ADSENSE_CLIENT }}
        run: |
          export ZOLA_VERSION="$(zola --version | awk '{print $2}')"
          export ZOLA_BUILD_SHA="$(git rev-parse --short=7 HEAD)"
          echo "Building with Zola $ZOLA_VERSION @ commit $ZOLA_BUILD_SHA"
          zola build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6
        with:
          # Tự bật Pages nếu "Get Pages site failed" — đúng khuyến nghị của action
          # cho lỗi rate limit/Pages chưa cấu hình (xem log configure-pages).
          enablement: true

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
