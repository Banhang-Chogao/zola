name: Build and deploy Zola site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Deploy định kỳ mỗi 6h để publish data bot refresh (dashboard/trends/…) mà
    # KHÔNG cần mỗi lần bot refresh tự dispatch deploy → giảm mạnh số deploy run.
    - cron: '0 */6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  # true: gộp "cơn bão" deploy (PR merge dồn dập / bot dispatch) → chỉ run mới
  # nhất chạy tới cùng, các run cũ bị huỷ sớm → giảm mạnh số lần gọi Pages API,
  # tránh "API rate limit exceeded for installation" ở bước configure-pages.
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Zola
        run: |
          curl -sLO https://github.com/getzola/zola/releases/download/v0.22.1/zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz
          sudo mv zola /usr/local/bin/

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build social OG cover images (SVG → .og.webp)
        run: |
          pip install -r scripts/requirements-og-images.txt
          python3 scripts/build_og_images.py

      - name: Build feed pagination anchors
        run: python3 scripts/build_feed_pagination.py

      - name: Build reference index
        run: python3 scripts/build_references.py

      - name: Build Google Rank sidebar data
        run: python3 scripts/build_google_rank.py

      - name: Build SEO Reality Check sidebar data
        run: python3 scripts/build_seo_reality.py

      - name: Build GitHub Activity data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/build_github_activity.py

      - name: Build GitHub Profile Badges data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/build_github_profile_badges.py

      - name: SEO Rank auto-fix report (scan only)
        run: python3 scripts/seo-rank-autofix.py --scan-only

      - name: Fetch Google Trends VN (hot search sidebar)
        run: python3 scripts/fetch_google_trends.py --limit 25

      - name: Strip premium content before build
        run: python3 scripts/paywall_prepare_build.py --strip

      - name: Build site
        env:
          ZOLA_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export ZOLA_VERSION="$(zola --version | awk '{print $2}')"
          export ZOLA_BUILD_SHA="$(git rev-parse --short=7 HEAD)"
          echo "Building with Zola $ZOLA_VERSION @ commit $ZOLA_BUILD_SHA"
          zola build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6
        with:
          # Tự bật Pages nếu "Get Pages site failed" — đúng khuyến nghị của action
          # cho lỗi rate limit/Pages chưa cấu hình (xem log configure-pages).
          enablement: true

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
