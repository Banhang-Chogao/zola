name: QA-Failed Auto-Healing

# Trigger: KHI 1 workflow khác kết thúc với status failure.
# Script qa-failed.py phân tích logs, fix pattern an toàn, push → re-deploy.
# Pattern không khớp → tạo GitHub issue + escalate cho user.

on:
  workflow_run:
    workflows:
      - "Deploy"
      - "Performance Audit"
      - "Build Semantic Related Posts"
      - "QA Gatekeeper"
      - "Security Audit"
      - "Self-Healing QA"
    types: [completed]

permissions:
  contents: write
  issues: write
  actions: read

# Native Node.js 24 opt-in (best practice, không dùng FORCE env)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: qa-failed-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  heal:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Buffer 30s: workflow_run event trigger NGAY khi failed event fire,
      # nhưng GitHub API thường chậm 10-30s mới expose logs đầy đủ.
      # Đợi đây thay vì để script poll giúp giảm số lần retry trong script.
      - name: Buffer GitHub API log lag
        run: sleep 30

      - name: Run qa-failed.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILED_RUN_ID: ${{ github.event.workflow_run.id }}
          FAILED_WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 qa-failed.py
          echo "qa-failed exit: $?"

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-failed-log-${{ github.event.workflow_run.id }}
          path: qa-failed.log
          if-no-files-found: ignore
          retention-days: 14
