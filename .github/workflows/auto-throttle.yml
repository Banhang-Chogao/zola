name: Auto Throttle Build-Related Cron

# One-shot scheduled job: 00:00 UTC ngày 16/06 → auto thay cron build-
# related.yml từ '*/5 * * * *' (mỗi 5 phút) sang '0 * * * *' (mỗi giờ)
# để tránh exceed GitHub Actions free tier quota.
#
# Sau lần chạy đầu, workflow này vẫn fire vào 16/06 mỗi năm nhưng sed
# sẽ no-op (pattern không match) → harmless idempotent.

on:
  schedule:
    # minute=0 hour=0 day=16 month=6 any-day-of-week → 16/06 00:00 UTC
    - cron: '0 0 16 6 *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  throttle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace build-related cron 5min → 1h
        run: |
          TARGET=.github/workflows/build-related.yml
          if grep -q "'\*/5 \* \* \* \*'" "$TARGET"; then
            sed -i "s|'\*/5 \* \* \* \*'|'0 \* \* \* \*'|" "$TARGET"
            echo "✓ Replaced cron to '0 * * * *' (mỗi giờ)"

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "$TARGET"
            git commit -m "Auto-throttle: build-related cron 5 phút → 1 giờ (16/06/2026)"
            for i in 1 2 3; do
              if git push origin HEAD:main; then exit 0; fi
              git fetch origin main && git rebase origin/main
              sleep $((i * 5))
            done
            exit 1
          else
            echo "Cron pattern '*/5 * * * *' không tìm thấy → đã throttle rồi, skip"
          fi
