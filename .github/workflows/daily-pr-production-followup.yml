name: Daily PR Production Followup

on:
  schedule:
    # 06:00 ICT = 23:00 UTC (previous day)
    - cron: "0 23 * * *"
  workflow_dispatch:

concurrency:
  group: daily-pr-followup
  cancel-in-progress: false

jobs:
  followup:
    name: PR triage + followup
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_BOT_PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gh CLI
        run: |
          type gh >/dev/null 2>&1 && echo "gh already available" || \
          (curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | \
          sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg && \
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] \
          https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list && \
          sudo apt-get update && sudo apt-get install gh -y)

      - name: Run daily PR followup
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_BOT_PAT || github.token }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.WORKFLOW_BOT_PAT || github.token }}
        run: python3 scripts/daily_pr_followup.py
        continue-on-error: true

      - name: Commit report if changed
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_BOT_PAT || github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/daily-pr-production-followup.md data/daily-pr-followup.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(daily-pr): followup report $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip changelog]"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Step summary
        if: always()
        run: |
          if [ -f reports/daily-pr-production-followup.md ]; then
            echo "## Daily PR Production Followup" >> $GITHUB_STEP_SUMMARY
            cat reports/daily-pr-production-followup.md >> $GITHUB_STEP_SUMMARY
          fi
