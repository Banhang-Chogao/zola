name: PR Status Gate (kt9 auto-check)

# Trigger matrix (2026-07-02 — full automation):
#   pull_request   → PR mở/push/reopen: check ngay trên PR đó
#   workflow_run    → QA Gatekeeper hoặc deploy.yml chạy xong (bất kể conclusion)
#                      → quét lại TOÀN BỘ open PR (bắt conflict/QA fail phát sinh
#                      từ merge khác, không cần PR đó có push mới)
#   schedule        → quét định kỳ mỗi 20' — bắt case không có event nào bắn
#                      (vd conflict do PR khác merge, QA fail âm thầm)
#   workflow_dispatch → chạy tay, tuỳ chọn 1 PR cụ thể

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_run:
    workflows:
      - "QA Gatekeeper"
      - "Build and deploy Zola site to GitHub Pages"
    types: [completed]
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to check (leave empty for all open)"
        required: false
        type: string

concurrency:
  group: pr-status-gate-${{ github.head_ref || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  checks: write
  actions: read

jobs:
  kt9-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: kt9 — PR health check + auto-fix
        id: kt9
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.pr_number }}" ]; then
            ARGS="--pr=${{ github.event.inputs.pr_number }}"
          fi
          python3 scripts/pr_status_check.py $ARGS 2>&1 | tee /tmp/kt9-report.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Post report as PR comment
        if: github.event_name == 'pull_request' && always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT=$(cat /tmp/kt9-report.txt)
          # Write report body to temp file to avoid YAML multi-line issues
          printf '## 🔧 KT9 PR Status Check\n\n%s\n' "$REPORT" > /tmp/kt9-body.txt
          gh pr comment ${{ github.event.number }} --body-file /tmp/kt9-body.txt || true

      - name: Set status check conclusion
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Re-run kt9 to get final status after potential auto-fix
          python3 scripts/pr_status_check.py --no-fix 2>&1 | tail -5
          FINAL_EXIT=$?
          if [ "$FINAL_EXIT" -eq 0 ]; then
            echo "✅ All checks passed — PR is healthy"
          else
            echo "⚠️ Issues remain — check report above"
          fi
