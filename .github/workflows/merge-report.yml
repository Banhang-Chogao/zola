name: Fetch Merge Report

# Thu thập lịch sử merge auto → data/merge-report.json
#
# RE-ENABLED with optimized schedule (27/06/2026): runs every 3 hours (8x/day)
# instead of hourly (24x/day) with push trigger. Removed push trigger to reduce
# quota usage. Estimated ~720 runs/month → 192 runs/month (~73% reduction).

on:
  schedule:
    - cron: '0 */3 * * *'   # Every 3 hours (8x/day, reduces from 24x/day)
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: merge-report
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Fetch merge history
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_REPORT_SINCE: "2026-06-17T00:00:00Z"
        run: python3 scripts/fetch_merge_report.py

      - name: Push to main if changed
        env:
          WORKFLOW_BOT_PAT: ${{ secrets.WORKFLOW_BOT_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x .github/scripts/push_to_main.sh
          .github/scripts/push_to_main.sh "Cập nhật: refresh Merge Report ($(date -u +%FT%TZ))" \
            data/merge-report.json