name: Autofix Merge Conflicts

# Quét PR open bị conflict với main, resolve an toàn, chạy QA/build, tạo PR fix riêng.
# TUYỆT ĐỐI KHÔNG push/merge main — chỉ branch autofix/conflict-pr-<N>.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Optional PR number to process (blank = scan all)'
        required: false
        type: string

concurrency:
  group: autofix-conflicts
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  autofix:
    if: github.repository == 'Banhang-Chogao/zola'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for merge)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Zola
        run: |
          curl -sLO https://github.com/getzola/zola/releases/download/v0.22.1/zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz
          sudo mv zola /usr/local/bin/

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run autofix conflict resolver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZOLA_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          ARGS=""
          if [ -n "${{ github.event.inputs.pr_number }}" ]; then
            ARGS="--pr ${{ github.event.inputs.pr_number }}"
          fi
          python3 scripts/autofix_conflicts.py $ARGS
          exit_code=$?
          echo "autofix_exit=${exit_code}" >> "$GITHUB_OUTPUT"
          # exit 1 chỉ khi script crash — partial manual vẫn OK
          if [ "$exit_code" -gt 1 ]; then exit "$exit_code"; fi

      - name: Safety guard — block accidental main push
        run: |
          CURRENT=$(git rev-parse --abbrev-ref HEAD)
          if [ "$CURRENT" = "main" ]; then
            echo "❌ BLOCKED: workflow đang ở main — không được push trực tiếp"
            exit 1
          fi
          echo "✓ Branch hiện tại: ${CURRENT} (không phải main)"