name: Content Direction
on:
  schedule:
    - cron: '0 10 * * *'   # 17:00 GMT+7 (10:00 UTC)
  workflow_dispatch:
permissions:
  contents: write
  actions: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
concurrency:
  group: content-direction
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt
      - name: Generate Content Direction report
        run: python3 scripts/content_direction.py
      - name: Push to main if changed
        env:
          WORKFLOW_BOT_PAT: ${{ secrets.WORKFLOW_BOT_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x .github/scripts/push_to_main.sh
          .github/scripts/push_to_main.sh "chore(data): refresh content direction report ($(date -u +%FT%TZ))" \
            static/data/content-direction/report.json
