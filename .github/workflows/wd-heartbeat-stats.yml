name: Heartbeat Stats

# Aggregates the deploy.yml run history into data/wd-heartbeat-stats.json — the
# build-time source for the calm-first .wd-heartbeat footer module (30-day
# heatmap + totals). Static-site safe: no live-backend dependency on GitHub
# Pages. Doctrine V27 — never fabricates numbers; the generator emits a pending
# payload when no completed runs exist.

on:
  schedule:
    - cron: '17 */2 * * *'   # every 2h at :17 (offset to avoid cron burst)
  workflow_dispatch:
  workflow_run:
    workflows: ["Build and deploy Zola site to GitHub Pages"]
    types: [completed]

permissions:
  contents: write
  actions: read

concurrency:
  group: wd-heartbeat-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          token: ${{ secrets.GH_GITHUB_COM_TOKEN }}

      - name: Collect deploy run history → data/wd-heartbeat-stats.json
        env:
          GH_TOKEN: ${{ secrets.GH_GITHUB_COM_TOKEN }}
        run: |
          set -euo pipefail
          RUNS="$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow deploy.yml \
            --branch main \
            --limit 200 \
            --json databaseId,headSha,conclusion,status,createdAt,updatedAt \
            || echo '[]')"
          export WD_RUNS_JSON="$RUNS"
          python3 scripts/wd_heartbeat_stats.py

      - name: Push to main if changed
        env:
          WORKFLOW_BOT_PAT: ${{ secrets.WORKFLOW_BOT_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x .github/scripts/push_to_main.sh
          .github/scripts/push_to_main.sh \
            "Cập nhật: refresh Heartbeat Stats ($(date -u +%FT%TZ)) [skip changelog]" \
            data/wd-heartbeat-stats.json
