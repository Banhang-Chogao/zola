name: Fetch GA Stats

# Hourly: fetch GA4 metrics qua Data API → commit data/ga-stats.json.
# Tera template render bảng visitors today/week/month ở footer blog.
#
# REQUIRED SECRET: GA_SERVICE_ACCOUNT_KEY (JSON content của Service Account
# có role 'Viewer' trên GA4 Property 541698865).

on:
  schedule:
    - cron: '0 * * * *'   # mỗi giờ đầu phút 0
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ga-stats
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Google Analytics SDK
        run: pip install --quiet google-analytics-data==0.18.18

      - name: Fetch GA stats
        env:
          GA_SERVICE_ACCOUNT_KEY: ${{ secrets.GA_SERVICE_ACCOUNT_KEY }}
        run: python scripts/fetch_ga_stats.py

      - name: Open PR if changed (never push main)
        env:
          WORKFLOW_BOT_PAT: ${{ secrets.WORKFLOW_BOT_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: "chore: refresh GA stats"
        run: |
          chmod +x .github/scripts/push_via_pr.sh
          .github/scripts/push_via_pr.sh chore/ga-stats-data \
            "Cập nhật: refresh GA stats ($(date -u +%FT%TZ))" \
            data/ga-stats.json
