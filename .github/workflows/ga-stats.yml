name: Fetch GA Stats

# Hourly: fetch GA4 metrics qua Data API → commit data/ga-stats.json.
# Tera template render bảng visitors today/week/month ở footer blog.
#
# REQUIRED SECRET: GA_SERVICE_ACCOUNT_KEY (JSON content của Service Account
# có role 'Viewer' trên GA4 Property 541698865).

on:
  schedule:
    - cron: '0 * * * *'   # mỗi giờ đầu phút 0
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ga-stats
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Google Analytics SDK
        run: pip install --quiet google-analytics-data==0.18.18

      - name: Fetch GA stats
        env:
          GA_SERVICE_ACCOUNT_KEY: ${{ secrets.GA_SERVICE_ACCOUNT_KEY }}
        run: python scripts/fetch_ga_stats.py

      - name: Commit if changed (race-safe)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git status --porcelain data/ga-stats.json | grep -q .; then
            echo "Không có thay đổi GA stats"; exit 0
          fi
          git add data/ga-stats.json
          git commit -m "Cập nhật: refresh GA stats ($(date -u +%FT%TZ))"
          for i in 1 2 3; do
            if git push origin HEAD:main; then exit 0; fi
            git fetch origin main && git rebase origin/main
            sleep $((i * 5))
          done
          exit 1
