name: Fetch GA Stats

# Hourly: fetch GA4 metrics qua Data API → commit data/ga-stats.json.
# Tera template render module visitors today/week/month ở footer blog (B-DNA).
#
# Property 542421812 (seomoney.org — migrated 21/06/2026). Output được stamp
# property_id/measurement_id/site_domain để template cách ly cache theo property
# (số của property cũ KHÔNG leak).
#
# REQUIRED SECRET: GA_SERVICE_ACCOUNT_KEY (JSON content của Service Account
# có role 'Viewer' trên GA4 Property 542421812).

on:
  schedule:
    - cron: '0 * * * *'   # mỗi giờ đầu phút 0
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ga-stats
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Google Analytics SDK
        run: pip install --quiet google-analytics-data==0.18.18

      - name: Fetch GA stats
        env:
          GA_SERVICE_ACCOUNT_KEY: ${{ secrets.GA_SERVICE_ACCOUNT_KEY }}
          GA_PROPERTY_ID: '542421812'
          GA_MEASUREMENT_ID: G-SMTFZVC0XN
          GA_SITE_DOMAIN: seomoney.org
        run: python scripts/fetch_ga_stats.py

      - name: Refresh improvement progress snapshot
        run: python scripts/fetch_ga_improvement_progress.py

      - name: Push to main if changed
        env:
          WORKFLOW_BOT_PAT: ${{ secrets.WORKFLOW_BOT_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x .github/scripts/push_to_main.sh
          .github/scripts/push_to_main.sh "Cập nhật: refresh GA stats ($(date -u +%FT%TZ))" \
            data/ga-stats.json \
            data/ga-improvement-progress.json \
            static/data/ga-improvement-progress.json
