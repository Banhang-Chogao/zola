name: QA Gatekeeper

# Chạy trên mọi push (kể cả main). qa_check.py fail → pipeline đỏ.

on:
  push:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install test dependencies (paywall + optional dashboards)
        run: |
          pip install -r backend/requirements.txt
          # Conditionally install dashboard dependencies if they exist
          # (F-Dashboard + L-Dashboard removed in Phase 2 cleanup)
          for req in scripts/requirements-f-dashboard.txt scripts/requirements-l-dashboard.txt; do
            if [ -f "$req" ]; then
              echo "Installing: $req"
              pip install -r "$req"
            else
              echo "Skipping missing optional requirements: $req"
            fi
          done

      - name: Unit tests — paywall + footer countdown + ai_diagnose + QA vaccines + social images
        run: |
          python3 -m unittest scripts.test_paywall scripts.test_footer_countdown scripts.test_ai_diagnose scripts.test_google_rank scripts.test_github_activity scripts.test_seo_rank_autofix scripts.test_qa_vaccines scripts.test_build_open_prs scripts.test_check_social_images scripts.test_security_public_audit -v

      # QA Gatekeeper: generic checks (conflicts/secrets/SEO/SCSS) PLUS the QA
      # Vaccine Gate — static detectors built from the CLAUDE.md vaccine library
      # (V1..V12 + compliance set). Runs BEFORE the expensive Zola build so known
      # recurring build-breakers (Tera kwargs, unbalanced blocks, broken
      # workflow YAML / config TOML, corrupt dashboard JSON, JS syntax errors,
      # premium posts with no backing private file) are blocked early. The step
      # exits 1 on any vaccine FAIL → fails the job → blocks auto-merge/deploy.
      - name: Run QA Gatekeeper + Vaccine Gate (conflicts/secrets/SEO/SCSS + CLAUDE.md vaccines)
        run: python3 qa_check.py

      - name: Install Zola for build check
        run: |
          curl -sLO https://github.com/getzola/zola/releases/download/v0.22.1/zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz
          sudo mv zola /usr/local/bin/

      - name: Build feed pagination anchors
        run: python3 scripts/build_feed_pagination.py

      - name: Build reference index
        run: python3 scripts/build_references.py

      - name: Build VIPZone picker catalog
        run: python3 scripts/build_vipzone_picker_catalog.py

      - name: Build Google Rank sidebar data
        run: python3 scripts/build_google_rank.py

      - name: Build SEO Reality Check sidebar data
        run: python3 scripts/build_seo_reality.py

      - name: Build GitHub Activity data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/build_github_activity.py

      - name: Build GitHub Profile Badges data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/build_github_profile_badges.py

      - name: SEO Rank auto-fix report (scan only)
        run: python3 scripts/seo-rank-autofix.py --scan-only

      - name: Strip premium content before build
        run: python3 scripts/paywall_prepare_build.py --strip

      - name: Build OG images (SVG → .og.webp for social sharing)
        run: python3 scripts/build_og_images.py

      - name: Zola build smoke test
        env:
          ZOLA_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: zola build

      - name: Check GitHub Pages base path in internal links
        run: python3 scripts/check_internal_links.py

      # Hard gate: crawl built public/ for broken INTERNAL links. The checker
      # exits 2 when any internal link 404s, which fails this step (and the job),
      # blocking auto-merge. Runs offline by default (no external requests) so it
      # never hangs CI. External links are intentionally not gated here.
      - name: Gate on broken internal links (404 checker — exit 2 fails build)
        run: python3 qa-404-checker.py

      # Social image validation: ensure all article pages have proper og:image
      # for Facebook/Zalo/LinkedIn previews. Checks that og:image is absolute URL,
      # not SVG, and file exists in public/. Exit 2 fails build.
      - name: Validate social share thumbnails (og:image — exit 2 fails build)
        run: python3 scripts/check_social_images.py --check

      # Static-site security gate: the built public/ surface (+ content/, static/,
      # sitemap, menu) must not expose private/internal files or secret values.
      # Runs AFTER the build so it scans the real published output + sitemap.xml.
      # Exit 1 (any exposure) fails the job → blocks auto-merge/deploy. Calibrated
      # so the current main passes clean. See docs/security-static-blog.md.
      - name: Public-surface security audit (no secrets/private docs published)
        run: python3 scripts/security_public_audit.py
