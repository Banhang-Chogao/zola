name: QA Gatekeeper

# Chạy trên PR vào main và push thẳng main. Nếu qa_check.py fail (exit !=0),
# pipeline đỏ → PR không merge được (nếu repo bật required status check).
# Chạy song song với deploy.yml — không block deploy nếu chỉ là warning.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Daily 11:00 GMT+7 = 04:00 UTC — baseline QA snapshot
    - cron: '0 4 * * *'
  workflow_dispatch:

# Native Node.js 24 opt-in (best practice, không dùng FORCE env)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  qa-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run QA checks (conflicts/secrets/SEO/SCSS syntax)
        # qa_check.py stdlib only — không cần pip install.
        # Exit 0 = pass (kể cả khi có warning), exit 1 = có error → fail job.
        # SCSS check bắt mất '{' / '}' trước khi Zola compile fail trong deploy.
        run: python3 qa_check.py

      # Defense-in-depth: thực sự run Zola build trong CI để bắt lỗi syntax
      # Tera template + SCSS compile mà Python check không phát hiện được.
      # Bug #57 (SCSS empty body block) chỉ cần ~5s Zola check là catch ngay.
      - name: Install Zola for build check
        run: |
          curl -sLO https://github.com/getzola/zola/releases/download/v0.22.1/zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz
          sudo mv zola /usr/local/bin/

      - name: Zola build smoke test
        # ZOLA_GH_TOKEN cho load_data fetch commits (template base.html).
        # Token QA workflow read-only — chỉ build, không deploy.
        env:
          ZOLA_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: zola build
