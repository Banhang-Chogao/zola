name: QA Gatekeeper

# Chạy trên mọi push (kể cả main). qa_check.py fail → pipeline đỏ.

on:
  push:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install test dependencies (paywall + F-Dashboard + L-Dashboard)
        run: |
          pip install -r backend/requirements.txt
          pip install -r scripts/requirements-f-dashboard.txt
          pip install -r scripts/requirements-l-dashboard.txt

      - name: Unit tests — paywall + dashboards + footer countdown + ai_diagnose
        run: |
          python3 -m unittest scripts.test_paywall scripts.test_f_dashboard scripts.test_l_dashboard scripts.test_footer_countdown scripts.test_ai_diagnose scripts.test_google_rank -v

      - name: Run QA checks (conflicts/secrets/SEO/SCSS syntax)
        run: python3 qa_check.py

      - name: Install Zola for build check
        run: |
          curl -sLO https://github.com/getzola/zola/releases/download/v0.22.1/zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz
          sudo mv zola /usr/local/bin/

      - name: Build reference index
        run: python3 scripts/build_references.py

      - name: Build Google Rank sidebar data
        run: python3 scripts/build_google_rank.py

      - name: Strip premium content before build
        run: python3 scripts/paywall_prepare_build.py --strip

      - name: Zola build smoke test
        env:
          ZOLA_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: zola build

      - name: Check GitHub Pages base path in internal links
        run: python3 scripts/check_internal_links.py