name: Check branch ancestry

# Verify that PR branch has a common ancestor with main.
# If not, the branch is "stale" (lost lineage due to main force-push).
# Fail early + comment with rebase instructions.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: check-ancestry-${{ github.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-ancestry:
    name: Verify branch has common ancestor with main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for merge-base

      - name: Fetch origin/main
        run: git fetch origin main

      - name: Check for common ancestor
        id: check
        run: |
          set +e  # Don't fail immediately; handle in next step
          MERGE_BASE=$(git merge-base HEAD origin/main 2>&1)
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✓ Common ancestor found: $MERGE_BASE"
            echo "status=ok" >> "$GITHUB_OUTPUT"
            echo "merge_base=$MERGE_BASE" >> "$GITHUB_OUTPUT"
          else
            echo "✗ No common ancestor with origin/main"
            echo "status=stale" >> "$GITHUB_OUTPUT"
            echo "error_msg=$MERGE_BASE" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR (stale branch)
        if: steps.check.outputs.status == 'stale'
        uses: actions/github-script@v7
        with:
          script: |
            const msg = `❌ **Branch has no common ancestor with \`main\`**

This branch is "stale" — it was created from an old commit, and \`main\` has been force-pushed since then. Git cannot find a merge base between this branch and \`main\`, making it unmerge-able.

**How to fix (rebase):**

\`\`\`bash
git fetch origin main
git rebase origin/main
# Resolve conflicts if any
git push --force-with-lease -u origin ${{ github.head_ref }}
\`\`\`

Once rebased, this check will pass and CI will proceed.

---

**What happened:** Your branch was created from commit \`${{ github.event.pull_request.head.sha }}\`, but \`main\` has moved far ahead (force-pushed). This is not a code bug — just a stale base. Rebase will fix it immediately.
`;

            // Check if we already commented
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes('Branch has no common ancestor'));

            if (!existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: msg,
              });
            }

      - name: Fail if stale
        if: steps.check.outputs.status == 'stale'
        run: |
          echo "❌ Branch is stale (no common ancestor with main)"
          echo "See PR comment above for rebase instructions."
          exit 1

      - name: Pass if healthy
        if: steps.check.outputs.status == 'ok'
        run: echo "✓ Branch has healthy ancestry: ${{ steps.check.outputs.merge_base }}"
