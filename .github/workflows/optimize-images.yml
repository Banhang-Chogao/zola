name: Optimize images (WebP)

# Convert mọi ảnh raster (.jpg/.jpeg/.png) → .webp duy nhất, xoá raster gốc.
# SVG/GIF giữ nguyên. Commit .webp + xoá raster; [skip ci] tránh vòng lặp.

on:
  push:
    branches: [main]
    paths:
      - 'static/**/*.jpg'
      - 'static/**/*.jpeg'
      - 'static/**/*.png'
      - 'content/**/*.jpg'
      - 'content/**/*.jpeg'
      - 'content/**/*.png'
  schedule:
    - cron: '0 4 * * *'    # Hằng ngày 11:00 GMT+7 = 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: optimize-images
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  webp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install --quiet Pillow

      - name: Convert rasters to WebP (replace originals)
        run: |
          python3 scripts/to_webp.py --replace static/img content || true

      - name: Open PR for WebP changes (never push main)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: "chore(img): convert raster assets to WebP"
        run: |
          chmod +x .github/scripts/push_via_pr.sh
          .github/scripts/push_via_pr.sh chore/webp-convert \
            "chore(img): convert raster assets to WebP only" \
            static/ content/