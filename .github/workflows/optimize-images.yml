name: Optimize images (WebP)

# Convert mọi ảnh raster (.jpg/.jpeg/.png) → .webp duy nhất, xoá raster gốc.
# SVG/GIF giữ nguyên. Commit .webp + xoá raster; [skip ci] tránh vòng lặp.

on:
  push:
    branches: [main]
    paths:
      - 'static/**/*.jpg'
      - 'static/**/*.jpeg'
      - 'static/**/*.png'
      - 'content/**/*.jpg'
      - 'content/**/*.jpeg'
      - 'content/**/*.png'
  schedule:
    - cron: '0 4 * * *'    # Hằng ngày 11:00 GMT+7 = 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: optimize-images
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  webp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install --quiet Pillow

      - name: Convert rasters to WebP (replace originals)
        run: |
          python3 scripts/to_webp.py --replace static/img content || true

      - name: Commit WebP changes (nếu có)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A static/ content/
          if git diff --cached --quiet; then
            echo "Không có thay đổi ảnh — bỏ qua commit."
            exit 0
          fi
          git commit -m "chore(img): convert raster assets to WebP only [skip ci]"
          for i in 1 2 4 8; do git push && break || sleep $i; done