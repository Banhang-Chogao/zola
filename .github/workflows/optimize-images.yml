name: Optimize images (WebP)

# Convert mọi ảnh raster (.jpg/.jpeg/.png) → .webp duy nhất, xoá raster gốc.
# SVG/GIF giữ nguyên. Commit .webp + xoá raster; [skip ci] tránh vòng lặp.

on:
  push:
    branches: [main]
    paths:
      - 'static/**/*.jpg'
      - 'static/**/*.jpeg'
      - 'static/**/*.png'
      - 'content/**/*.jpg'
      - 'content/**/*.jpeg'
      - 'content/**/*.png'
  schedule:
    - cron: '0 4 * * *'    # Hằng ngày 11:00 GMT+7 = 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: optimize-images
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  webp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install --quiet Pillow

      - name: Convert rasters to WebP (replace originals)
        run: |
          python3 scripts/to_webp.py --replace static/img content || true

      # Run AFTER WebP conversion so the FINAL production .webp is the image that
      # gets the ownership watermark exactly once (idempotent — already-watermarked
      # images are skipped, so re-runs produce no churn). See
      # scripts/watermark_blog_images.py + data/image-watermark-manifest.json.
      - name: Watermark eligible blog images
        run: |
          python3 scripts/watermark_blog_images.py --apply || true

      - name: Push WebP + watermark changes to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x .github/scripts/push_to_main.sh
          .github/scripts/push_to_main.sh "chore(img): convert raster assets to WebP + watermark" \
            static/ content/ data/image-watermark-manifest.json