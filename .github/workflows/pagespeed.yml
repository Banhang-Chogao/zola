name: Fetch PageSpeed Insights

# Hourly: fetch Lighthouse scores qua PageSpeed Insights API v5.
# API public (free 25k queries/day) - KHÔNG cần Service Account.
# Optional secret PAGESPEED_API_KEY cho rate limit cao.

on:
  schedule:
    - cron: '15 * * * *'   # phút 15 mỗi giờ (lệch GA stats ở phút 0)
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pagespeed
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch PageSpeed
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
        run: python scripts/fetch_pagespeed.py

      - name: Commit if changed (race-safe)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git status --porcelain data/pagespeed.json | grep -q .; then
            echo "Không có thay đổi"; exit 0
          fi
          git add data/pagespeed.json
          git commit -m "Cập nhật: refresh PageSpeed scores ($(date -u +%FT%TZ))"
          for i in 1 2 3; do
            if git push origin HEAD:main; then exit 0; fi
            git fetch origin main && git rebase origin/main
            sleep $((i * 5))
          done
          exit 1
