name: Automatic SEO Priority Engine Audit

on:
  push:
    branches: [ "main" ] # Tự động chạy mỗi khi bạn update/push bài viết mới
  schedule:
    - cron: '0 0 * * *' # Tự động chạy ngầm định kỳ vào 00:00 UTC hàng ngày

jobs:
  seo_audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js Môi trường
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: |
        if [ -f package.json ]; then
          npm install
        fi

    - name: Run SEO Priority Engine Bot
      run: node seo_engine.js
