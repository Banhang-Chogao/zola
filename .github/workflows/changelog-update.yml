name: Auto-update changelog.json

# Trigger khi push lên main. Ghi changelog → push thẳng main (không PR).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number (optional — legacy merge commits)"
        required: false
        type: string

concurrency:
  group: changelog-update
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    if: >-
      github.event_name == 'workflow_dispatch'
      || !contains(github.event.head_commit.message, '[skip changelog]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve commit metadata
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          MODE="commit"
          NUM=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.pr_number }}" ]; then
            NUM="${{ inputs.pr_number }}"
            MODE="pr"
          else
            MSG="$HEAD_COMMIT_MSG"
            NUM=$(echo "$MSG" | head -1 | grep -oE '(Merge pull request #|\(#)[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
            if [ -n "$NUM" ]; then
              MODE="pr"
            fi
          fi

          if [ "$MODE" = "pr" ]; then
            STATE=$(gh pr view "$NUM" --repo "${GITHUB_REPOSITORY}" --json state --jq '.state')
            if [ "$STATE" != "MERGED" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "PR #${NUM} not merged — skip"
              exit 0
            fi
            gh pr view "$NUM" --repo "${GITHUB_REPOSITORY}" \
              --json title,body,additions,deletions,mergedAt,labels \
              > meta.json
            echo "mode=pr" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "number=$NUM" >> "$GITHUB_OUTPUT"
            echo "title<<EOF" >> "$GITHUB_OUTPUT"
            jq -r '.title' meta.json >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "body<<EOF" >> "$GITHUB_OUTPUT"
            jq -r '.body // ""' meta.json >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "additions=$(jq -r '.additions' meta.json)" >> "$GITHUB_OUTPUT"
            echo "deletions=$(jq -r '.deletions' meta.json)" >> "$GITHUB_OUTPUT"
            echo "merged_at=$(jq -r '.mergedAt' meta.json)" >> "$GITHUB_OUTPUT"
            echo "labels=$(jq -c '.labels' meta.json)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TITLE=$(echo "$HEAD_COMMIT_MSG" | head -1)
          if [ -z "$TITLE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Empty commit message — skip"
            exit 0
          fi

          STATS=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}" \
            --jq '{additions: .stats.additions, deletions: .stats.deletions, date: .commit.committer.date}')
          echo "mode=commit" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "title<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TITLE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "additions=$(echo "$STATS" | jq -r '.additions // 0')" >> "$GITHUB_OUTPUT"
          echo "deletions=$(echo "$STATS" | jq -r '.deletions // 0')" >> "$GITHUB_OUTPUT"
          echo "merged_at=$(echo "$STATS" | jq -r '.date // ""')" >> "$GITHUB_OUTPUT"
          echo "labels=[]" >> "$GITHUB_OUTPUT"

      - name: Skip — nothing to log
        if: steps.meta.outputs.skip == 'true'
        run: echo "Changelog update skipped."

      - name: Setup Node.js 24
        if: steps.meta.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Set up Python
        if: steps.meta.outputs.skip != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Append entry to changelog.json
        if: steps.meta.outputs.skip != 'true'
        id: changelog
        env:
          CHANGELOG_MODE: ${{ steps.meta.outputs.mode }}
          PR_NUMBER: ${{ steps.meta.outputs.number }}
          PR_TITLE: ${{ steps.meta.outputs.title }}
          COMMIT_SHA: ${{ steps.meta.outputs.sha }}
          PR_BODY: ${{ steps.meta.outputs.body }}
          PR_ADDITIONS: ${{ steps.meta.outputs.additions }}
          PR_DELETIONS: ${{ steps.meta.outputs.deletions }}
          PR_MERGED_AT: ${{ steps.meta.outputs.merged_at }}
          PR_LABELS: ${{ steps.meta.outputs.labels }}
        run: python3 .github/scripts/update_changelog.py

      - name: Push changelog to main
        if: steps.meta.outputs.skip != 'true' && steps.changelog.outputs.changed == 'true'
        env:
          WORKFLOW_BOT_PAT: ${{ secrets.WORKFLOW_BOT_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MESSAGE: ${{ steps.changelog.outputs.commit_message }}
          SKIP_CHANGELOG_TAG: "false"
        run: |
          chmod +x .github/scripts/push_to_main.sh
          .github/scripts/push_to_main.sh "$COMMIT_MESSAGE" changelog.json