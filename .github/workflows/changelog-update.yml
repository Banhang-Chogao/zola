name: Auto-update changelog.json

# Trigger mỗi khi PR đóng. Job chỉ chạy nếu PR thực sự MERGED (không
# phải close không merge) và base branch là main. Bot bot github-actions
# Bot tạo PR chore/changelog-sync (KHÔNG push main) sau khi PR merged.

on:
  pull_request:
    types: [closed]
    branches: [main]

# Queue nếu có nhiều PR merge gần nhau → tránh race condition trên JSON
concurrency:
  group: changelog-update
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

# Native Node.js 24 opt-in (best practice, không dùng FORCE env)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Append entry to changelog.json
        id: changelog
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_ADDITIONS: ${{ github.event.pull_request.additions }}
          PR_DELETIONS: ${{ github.event.pull_request.deletions }}
          PR_MERGED_AT: ${{ github.event.pull_request.merged_at }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels) }}
        run: python3 .github/scripts/update_changelog.py

      - name: Open PR if changed (never push main)
        if: steps.changelog.outputs.changed == 'true'
        env:
          WORKFLOW_BOT_PAT: ${{ secrets.WORKFLOW_BOT_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MESSAGE: ${{ steps.changelog.outputs.commit_message }}
          PR_TITLE: "chore: changelog after PR #${{ github.event.pull_request.number }}"
        run: |
          chmod +x .github/scripts/push_via_pr.sh
          .github/scripts/push_via_pr.sh chore/changelog-sync \
            "$COMMIT_MESSAGE" \
            changelog.json
