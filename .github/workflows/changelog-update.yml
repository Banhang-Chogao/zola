name: Auto-update changelog.json

# Trigger mỗi khi PR đóng. Job chỉ chạy nếu PR thực sự MERGED (không
# phải close không merge) và base branch là main. Bot bot github-actions
# sẽ commit + push entry mới vào changelog.json lên main.

on:
  pull_request:
    types: [closed]
    branches: [main]

# Queue nếu có nhiều PR merge gần nhau → tránh race condition trên JSON
concurrency:
  group: changelog-update
  cancel-in-progress: false

permissions:
  contents: write

# Native Node.js 24 opt-in (best practice, không dùng FORCE env)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Append entry to changelog.json
        id: changelog
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_ADDITIONS: ${{ github.event.pull_request.additions }}
          PR_DELETIONS: ${{ github.event.pull_request.deletions }}
          PR_MERGED_AT: ${{ github.event.pull_request.merged_at }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels) }}
        run: python3 .github/scripts/update_changelog.py

      - name: Commit + push nếu có thay đổi
        if: steps.changelog.outputs.changed == 'true'
        env:
          COMMIT_MESSAGE: ${{ steps.changelog.outputs.commit_message }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add changelog.json
          if git diff --cached --quiet; then
            echo "Không có thay đổi để commit — skip"
            exit 0
          fi
          # Commit message từ python script: 'Thêm tính năng: <title>' /
          # 'Sửa lỗi: <title>' / 'Cập nhật: <title>' — phản ánh nội dung
          # thật của PR thay vì 'Auto-changelog: PR #N' generic.
          git commit -m "$COMMIT_MESSAGE"
          # Retry push tối đa 3 lần nếu main bị update concurrent
          for i in 1 2 3; do
            git pull --rebase origin main || true
            if git push origin main; then
              echo "✓ Pushed changelog update (try $i): $COMMIT_MESSAGE"
              exit 0
            fi
            sleep 2
          done
          echo "✗ Push failed sau 3 retries"
          exit 1
