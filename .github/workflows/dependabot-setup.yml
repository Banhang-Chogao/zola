name: Dependabot Auto-Merge for Patch Updates

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch PR metadata
        id: dependabot
        uses: dependabot/fetch-metadata@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-approve & merge patch/minor updates
        if: |
          steps.dependabot.outputs.update-type == 'version-update:semver-patch' ||
          steps.dependabot.outputs.update-type == 'version-update:semver-minor'
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on major updates (require manual review)
        if: steps.dependabot.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr comment "$PR_URL" -b "⚠️ Major version update detected. Please review the changelog before merging."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
