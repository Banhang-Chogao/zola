name: AI Writer Dispatch

# Triggered by the frontend /tools/content-creator/ "Viết blog" button via
# repository_dispatch (proxied through the VIPZone backend). The workflow calls
# an AI provider, generates a Zola blog post, creates a branch, commits the
# file, and opens a PR → auto-merge → deploy.

on:
  repository_dispatch:
    types: [ai_writer_create_post]

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: ai-writer-dispatch
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate blog post via AI
        id: gen
        env:
          INPUT_PROMPT: ${{ github.event.client_payload.prompt }}
          INPUT_TOPIC: ${{ github.event.client_payload.topic }}
          INPUT_CATEGORY: ${{ github.event.client_payload.category }}
          INPUT_PRICING: ${{ github.event.client_payload.pricing }}
          INPUT_BRIEF: ${{ github.event.client_payload.brief }}
          INPUT_UX_BRIEF: ${{ github.event.client_payload.ux_brief }}
          INPUT_SERIES_ID: ${{ github.event.client_payload.series_id }}
          AI_API_KEY: ${{ secrets.CONTENT_CREATOR_AI_API_KEY }}
          AI_API_URL: ${{ secrets.CONTENT_CREATOR_AI_URL }}
          AI_MODEL: ${{ secrets.CONTENT_CREATOR_AI_MODEL }}
        run: |
          OUT=$(python3 scripts/ai_writer_dispatch_worker.py 2>&1)
          echo "$OUT"
          # Parse output lines for workflow variables.
          while IFS= read -r line; do
            case "$line" in
              SLUG=*) echo "slug=${line#SLUG=}" >> "$GITHUB_OUTPUT" ;;
              FILE_PATH=*) echo "file_path=${line#FILE_PATH=}" >> "$GITHUB_OUTPUT" ;;
              TITLE=*) echo "title=${line#TITLE=}" >> "$GITHUB_OUTPUT" ;;
              BRANCH=*) echo "branch=${line#BRANCH=}" >> "$GITHUB_OUTPUT" ;;
            esac
          done <<< "$OUT"

      - name: Create branch and commit
        if: steps.gen.outputs.slug != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.gen.outputs.branch }}"
          FILE_PATH="${{ steps.gen.outputs.file_path }}"
          TITLE="${{ steps.gen.outputs.title }}"

          # Create branch from latest main.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -b "$BRANCH" origin/main

          # Verify file exists.
          if [ ! -f "$FILE_PATH" ]; then
            echo "ERROR: $FILE_PATH not found"
            exit 1
          fi

          # Commit the new post.
          git add "$FILE_PATH"
          git commit -m "feat(ai-writer): ${TITLE}"

          # Push branch (force-with-lease safe for new branches).
          git push origin "$BRANCH"

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.gen.outputs.slug != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.gen.outputs.branch }}"
          TITLE="${{ steps.gen.outputs.title }}"

          PR_BODY="## 🤖 AI Writer — ${TITLE}

          **Chủ đề:** ${{ github.event.client_payload.topic }}
          **Slug:** \`${{ steps.gen.outputs.slug }}\`
          **Category:** ${{ github.event.client_payload.category }}

          ---
          *Bài viết được tạo tự động bởi AI Writer. QA gate sẽ kiểm tra trước khi auto-merge.*"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "feat(ai-writer): ${TITLE}" \
            --body "$PR_BODY" \
            --label "auto-healing" \
            --label "ai-writer"

      - name: Log failure (non-blocking)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const slug = '${{ steps.gen.outputs.slug }}' || 'unknown';
            const topic = context.payload?.client_payload?.topic || 'unknown';
            console.log(`AI Writer failed for topic="${topic}" slug="${slug}"`);
            console.log(`Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`);
