name: Deploy Guard & Resilience Check

on:
  workflow_run:
    workflows: ["Build and deploy Zola site to GitHub Pages"]
    types: [completed]
  workflow_dispatch:
  schedule:
    # Check every hour if latest main is deployed to production.
    # If not, dispatch deploy.yml to retry.
    - cron: "0 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: deploy-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 20

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Deploy Guard — verify latest main is live
        id: guard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 << 'GUARD_SCRIPT'
          import json
          import os
          import subprocess
          from datetime import datetime
          from pathlib import Path
          from urllib.error import HTTPError, URLError
          from urllib.request import Request, urlopen
          from zoneinfo import ZoneInfo

          ROOT = Path.cwd()
          REPO = os.environ.get("GITHUB_REPOSITORY", "Banhang-Chogao/zola")
          TOKEN = os.environ.get("GITHUB_TOKEN", "")
          TZ = ZoneInfo("Asia/Ho_Chi_Minh")

          def now_iso():
              return datetime.now(TZ).astimezone().isoformat()

          def short_sha(sha):
              return (sha or "")[:7]

          def api_get(path, headers_extra=None):
              if not TOKEN:
                  return None
              headers = {
                  "Authorization": f"Bearer {TOKEN}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "deploy-guard/1.0",
              }
              if headers_extra:
                  headers.update(headers_extra)
              req = Request(f"https://api.github.com{path}", headers=headers)
              try:
                  with urlopen(req, timeout=12) as resp:
                      return json.loads(resp.read().decode("utf-8"))
              except (HTTPError, URLError, OSError):
                  return None

          # Get latest main commit SHA
          try:
              main_sha = subprocess.run(
                  ["git", "rev-parse", "HEAD"],
                  capture_output=True, text=True, timeout=10, check=True
              ).stdout.strip()
              main_short = short_sha(main_sha)
          except subprocess.SubprocessError:
              main_sha = None
              main_short = "unknown"
              print("⚠️  Cannot get main SHA from git")

          # Get GitHub Pages deployment status
          pages_data = api_get(f"/repos/{REPO}/pages")
          deployed_sha = None
          deployed_url = None
          deployed_status = "unknown"

          if pages_data:
              deployed_sha = pages_data.get("source", {}).get("sha")
              deployed_url = pages_data.get("html_url")
              deployed_status = pages_data.get("status", "unknown")
              print(f"✓ GitHub Pages status: {deployed_status}")
              if deployed_sha:
                  print(f"  Deployed SHA: {short_sha(deployed_sha)}")

          # Check latest successful deploy run
          runs_data = api_get(f"/repos/{REPO}/actions/workflows/deploy.yml/runs?status=success&per_page=1")
          latest_deploy_run = None
          latest_deploy_sha = None

          if runs_data and runs_data.get("workflow_runs"):
              latest_deploy_run = runs_data["workflow_runs"][0]
              latest_deploy_sha = latest_deploy_run.get("head_sha")
              print(f"✓ Latest deploy run: #{latest_deploy_run.get('run_number')} (SHA: {short_sha(latest_deploy_sha)})")

          # Determine guard status
          guard_status = "unknown"
          guard_action = None
          guard_reason = ""

          if main_sha and deployed_sha:
              if main_sha == deployed_sha:
                  guard_status = "live"
                  guard_reason = "Latest main commit is live on GitHub Pages"
                  print(f"✅ {guard_reason}")
              else:
                  guard_status = "stale_deploy"
                  guard_reason = f"Deployed SHA ({short_sha(deployed_sha)}) is older than main ({short_sha(main_sha)})"
                  guard_action = "dispatch_deploy"
                  print(f"⚠️  {guard_reason}")
                  print(f"   → Dispatching deploy.yml to catch up...")
          elif main_sha and not deployed_sha:
              guard_status = "no_deploy"
              guard_reason = "No successful GitHub Pages deployment found"
              guard_action = "dispatch_deploy"
              print(f"⚠️  {guard_reason}")
              print(f"   → Dispatching deploy.yml...")
          else:
              print("⚠️  Cannot determine guard status (missing main or deployed SHA)")

          # Write guard status to GitHub output
          print(f"::set-output name=status::{guard_status}")
          print(f"::set-output name=main_sha::{main_sha}")
          print(f"::set-output name=main_short::{main_short}")
          print(f"::set-output name=deployed_sha::{deployed_sha}")
          print(f"::set-output name=deployed_short::{short_sha(deployed_sha) if deployed_sha else 'unknown'}")
          print(f"::set-output name=guard_action::{guard_action or 'none'}")
          print(f"::set-output name=guard_reason::{guard_reason}")
          print(f"::set-output name=timestamp::{now_iso()}")

          GUARD_SCRIPT

      - name: Log guard decision
        run: |
          echo "Guard Status: ${{ steps.guard.outputs.status }}"
          echo "Main SHA: ${{ steps.guard.outputs.main_short }}"
          echo "Deployed SHA: ${{ steps.guard.outputs.deployed_short }}"
          echo "Guard Action: ${{ steps.guard.outputs.guard_action }}"
          echo "Reason: ${{ steps.guard.outputs.guard_reason }}"

      - name: Dispatch deploy.yml if needed
        if: steps.guard.outputs.guard_action == 'dispatch_deploy'
        run: |
          gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build production dashboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 scripts/build_production_dashboard.py || true

      - name: Upload production dashboard as artifact (non-blocking)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-dashboard
          path: data/production-dashboard.json
          if-no-files-found: ignore
          retention-days: 7
