name: Deploy Monitor

# Fetch deploy.yml runs → data/deploy-monitor.json + data/prod-snapshot.json
# for Changelog ?? panel. Token only from Actions env — never committed.

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: deploy-monitor
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch deploy monitor report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/fetch_deploy_monitor.py

      - name: Build production snapshot (??)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/build_prod_snapshot.py

      - name: Publish reports (only if changed)
        env:
          WORKFLOW_BOT_PAT: ${{ secrets.WORKFLOW_BOT_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x .github/scripts/push_to_main.sh || true
          .github/scripts/push_to_main.sh \
            "Cập nhật: Deploy Monitor + prod snapshot ($(date -u +%FT%TZ)) [skip changelog]" \
            data/deploy-monitor.json data/prod-snapshot.json || echo "unchanged / push skipped"