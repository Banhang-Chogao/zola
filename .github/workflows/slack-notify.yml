name: Slack Commit Notification

# Trigger push lên bất kỳ branch → gửi notification về Slack.
#
# Dùng generator nội bộ scripts/slack_notify_ux.py (gửi trực tiếp qua urllib) thay
# cho slackapi/slack-github-action. Lý do: action đó từng vỡ workflow khi version
# bị bump (V2 — input v1 ≠ v2/v3). Generator stdlib-only → không còn version churn,
# tự truncate theo limit Block Kit 3000 chars, layout đẹp + human (header/context/button).
#
# Yêu cầu GitHub Secret: SLACK_WEBHOOK_URL (lấy từ Slack Incoming Webhook).

on:
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  notify:
    # Bỏ qua commit có [skip ci]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout (cần script generator)
        uses: actions/checkout@v4

      - name: Gửi notification commit qua generator
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL chưa cấu hình — bỏ qua."
            exit 0
          fi
          # Dòng đầu commit = summary (title). Phần thân giữ trong link "Xem commit".
          SUMMARY="${COMMIT_MSG%%$'\n'*}"
          SHORT="${SHA:0:7}"
          python3 scripts/slack_notify_ux.py info \
            --title "Commit mới: ${SUMMARY}" \
            --message "*${ACTOR}* vừa đẩy 1 commit lên \`${BRANCH}\`. Bấm để xem chi tiết thay đổi 👇" \
            --host "$REPO" \
            --context-extra "🔀 ${BRANCH}  ·  🧬 ${SHORT}" \
            --button-text "Xem commit" \
            --button-url "$COMMIT_URL" \
            --send
