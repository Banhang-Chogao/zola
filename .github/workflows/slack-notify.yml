name: Slack Commit Notification

# Trigger push lên bất kỳ branch → gửi notification về Slack.
# FIX: truncate commit message để không vượt Slack Block Kit limit 3000 chars
# (squash merge với nhiều commits có thể tạo message rất dài → invalid_blocks).
#
# Yêu cầu GitHub Secret: SLACK_WEBHOOK_URL (lấy từ Slack Incoming Webhook).

on:
  push:
    branches:
      - '**'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  notify:
    # Bỏ qua commit có [skip ci]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - name: Truncate commit message
        id: trim
        env:
          FULL_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Cap 2500 chars (buffer cho prefix + JSON escape)
          # Slack Block Kit text limit = 3000 chars per element
          MSG="${FULL_MSG:0:2500}"
          if [ ${#FULL_MSG} -gt 2500 ]; then
            MSG="$MSG\n\n... [truncated, full: ${#FULL_MSG} chars]"
          fi
          # Multiline env var for next step
          {
            echo 'msg<<EOF'
            echo "$MSG"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Send commit info to Slack
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "New commit on ${{ github.repository }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Commit mới trên ${{ github.repository }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n`${{ github.ref_name }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ${{ toJSON(format('*Commit message:*\n{0}', steps.trim.outputs.msg)) }}
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|Xem commit trên GitHub>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
