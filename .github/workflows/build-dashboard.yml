name: Fetch Build Dashboard

# Thu thập lịch sử GitHub Actions (deploy + QA) → data/build-dashboard.json
# Snapshot mỗi 6 giờ (cron) + manual dispatch — trang /insights/ đọc history.
#
# SECRETS (tùy chọn):
#   BUILD_DASHBOARD_AI_API_KEY — OpenAI-compatible key để phân tích log lỗi
#                                bằng AI (nếu không có → dùng rule-based).
#   BUILD_DASHBOARD_AI_API_URL — endpoint chat completions (mặc định OpenAI).
#   BUILD_DASHBOARD_AI_MODEL   — model slug (mặc định gpt-4o-mini).
#
# GITHUB_TOKEN: tự inject, cần quyền actions:read (permissions bên dưới).

on:
  # NOTE: workflow_run trigger removed (2026-06-18). Refreshing after every
  # deploy/QA pushed a new-timestamp data/build-dashboard.json → triggered
  # deploy.yml (push) → re-ran this workflow → deploy loop that exhausted the
  # GitHub API rate limit ("Get Pages site failed … rate limit exceeded" in the
  # Setup Pages step). Snapshot now runs on a relaxed schedule + manual dispatch.
  schedule:
    - cron: '0 */6 * * *'   # mỗi 6 giờ — snapshot lịch sử build/deploy (giãn từ */5)
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: build-dashboard
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Fetch build history
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_DASHBOARD_AI_API_KEY: ${{ secrets.BUILD_DASHBOARD_AI_API_KEY }}
          BUILD_DASHBOARD_AI_API_URL: ${{ secrets.BUILD_DASHBOARD_AI_API_URL }}
          BUILD_DASHBOARD_AI_MODEL: ${{ secrets.BUILD_DASHBOARD_AI_MODEL }}
        run: python scripts/fetch_build_dashboard.py

      - name: Push to main if changed
        env:
          WORKFLOW_BOT_PAT: ${{ secrets.WORKFLOW_BOT_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x .github/scripts/push_to_main.sh
          .github/scripts/push_to_main.sh "Cập nhật: refresh Build Dashboard ($(date -u +%FT%TZ))" \
            data/build-dashboard.json