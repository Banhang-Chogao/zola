name: Manual Broken Links Healing Bot

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Healing mode"
        type: choice
        options:
          - scan-only
          - fix
        default: fix

jobs:
  heal-broken-links:
    name: Heal Broken Links
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@0.18.0

      - name: Build site
        run: zola build

      - name: Run broken links scan/fix
        id: heal
        run: |
          MODE="${{ inputs.mode }}"
          if [ "$MODE" = "scan-only" ]; then
            python3 scripts/heal_broken_links.py --scan --stdout
          else
            python3 scripts/heal_broken_links.py --fix --stdout
          fi

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git diff --stat
          fi

      - name: Regenerate references (if fixes applied)
        if: steps.check-changes.outputs.has_changes == 'true'
        run: python3 scripts/build_references.py

      - name: Run QA checks (if fixes applied)
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          python3 qa_check.py
          python3 scripts/check_internal_links.py
          python3 qa-404-checker.py

      - name: Verify zola build (if fixes applied)
        if: steps.check-changes.outputs.has_changes == 'true'
        run: zola build

      - name: Create PR with fixes
        if: |
          steps.check-changes.outputs.has_changes == 'true' &&
          inputs.mode == 'fix'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: |
            fix(links): heal broken internal links

            Auto-healed broken internal links with safe patterns.
            See reports/broken-links/ for detailed healing report.

            Co-Authored-By: Broken Links Healing Bot <noreply@github.com>
          branch: bot/heal-broken-links-${{ github.run_number }}
          title: "fix(links): heal broken internal links"
          body: |
            ## Problem
            Broken internal links detected by automated scan.

            ## Summary
            ${{ steps.heal.outputs.stdout || 'See artifact for details' }}

            ## Testing
            - [x] `zola build` passed
            - [x] `qa_check.py` passed
            - [x] `check_internal_links.py` passed
            - [x] `qa-404-checker.py` passed
            - [x] `build_references.py` regenerated

            ## Auto-fix Rules Applied
            - `/zola/` prefix normalization
            - Trailing slash correction
            - Case/slug normalization (unique matches only)
            - Known alias mapping
            - Fragment cleanup

            ## Safe Fixes Only
            This PR contains only high-confidence auto-fixes.
            Manual review items are reported separately.

            See `data/broken-links-report.json` and `reports/broken-links/` for full details.

            ---
            🤖 Generated by Broken Links Healing Bot
          delete-branch: true
          labels: |
            auto-healing
            links
          draft: false

      - name: Upload reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: broken-links-reports
          path: |
            data/broken-links-report.json
            reports/broken-links/
          retention-days: 30

      - name: Job summary
        if: always()
        run: |
          echo "## Broken Links Healing Bot" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** ${{ inputs.mode }}" >> $GITHUB_STEP_SUMMARY
          echo "**Changes:** ${{ steps.check-changes.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "data/broken-links-report.json" ]; then
            echo "### Report Summary" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            python3 -c "import json; r=json.load(open('data/broken-links-report.json')); print(json.dumps(r['summary'], indent=2))" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
