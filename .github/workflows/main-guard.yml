name: Main Branch Guard

on:
  push:
    branches: [main]

env:
  TARGET_BRANCH: main
  ALLOWED_ACTOR: github-actions[bot]

jobs:
  block-direct-push:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::error::Push trực tiếp vào ${TARGET_BRANCH} bị cấm. Nhánh riêng → PR → review → Batch Merge."
          exit 1