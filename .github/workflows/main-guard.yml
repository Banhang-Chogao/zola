name: Main Branch Guard

on:
  push:
    branches: [main]

env:
  TARGET_BRANCH: main
  ALLOWED_ACTOR: github-actions[bot]

jobs:
  block-direct-push:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::error::Direct push to ${TARGET_BRANCH} forbidden. Feature branch → PR → manual approval → batch merge."
          exit 1