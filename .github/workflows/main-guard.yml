name: Main Branch Guard

# Chặn push trực tiếp main (trừ github-actions[bot] sau batch merge).

on:
  push:
    branches: [main]

env:
  TARGET_BRANCH: main
  ALLOWED_ACTOR: github-actions[bot]

jobs:
  block-direct-push:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::error::Direct push to ${TARGET_BRANCH} forbidden. Use feature branch → PR → batch merge."
          exit 1