name: Main Branch Guard

# Chặn push trực tiếp lên main — chỉ cho phép commit từ PR đã merge.
# Bot (github-actions[bot]) LUÔN bị chặn.
# Human: chỉ pass nếu commit gắn với merged PR.

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

env:
  TARGET_BRANCH: main

jobs:
  block-direct-push:
    runs-on: ubuntu-latest
    steps:
      - name: Block bot direct push
        if: github.actor == 'github-actions[bot]'
        run: |
          echo "::error title=Bot direct push blocked::github-actions[bot] must use push_via_pr.sh → feature branch → PR. Never push main."
          exit 1

      - name: Allow only PR-merge commits for humans
        if: github.actor != 'github-actions[bot]'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          prs=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
            --jq 'length' 2>/dev/null || echo "0")
          if [ "$prs" -gt 0 ]; then
            echo "✓ Commit ${GITHUB_SHA:0:7} linked to PR — allowed (manual merge path)"
            exit 0
          fi
          echo "::error title=Direct push blocked::Push to ${TARGET_BRANCH} forbidden. Use feature branch → PR → manual merge."
          echo "Actor: ${{ github.actor }}"
          echo "See docs/OPERATIONS.md"
          exit 1