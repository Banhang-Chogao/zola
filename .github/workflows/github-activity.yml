name: Fetch GitHub Activity

# Thu thập hoạt động repo (commits, PR, issues, reviews) → data/github-activity.json
# Trang /insights/ đọc file này để render heatmap GitHub Activity.

on:
  workflow_run:
    workflows:
      - "Build and deploy Zola site to GitHub Pages"
    types: [completed]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: github-activity
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build GitHub Activity JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/build_github_activity.py

      - name: Push to main if changed
        env:
          WORKFLOW_BOT_PAT: ${{ secrets.WORKFLOW_BOT_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x .github/scripts/push_to_main.sh
          .github/scripts/push_to_main.sh "Cập nhật: refresh GitHub Activity ($(date -u +%FT%TZ))" \
            data/github-activity.json