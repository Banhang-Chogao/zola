name: Auto-merge

# ZERO_BARRIER: QA Gatekeeper xanh → tự squash-merge PR mở vào main → deploy.
# Dùng workflow_run để có quyền ghi an toàn (khác pull_request từ fork).
# Engine: scripts/try_auto_merge.py · Policy: data/auto-merge-policy.json

on:
  workflow_run:
    workflows: ["QA Gatekeeper"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR cụ thể để thử auto-merge (bỏ trống = quét mọi PR mở đủ điều kiện)"
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: auto-merge-${{ github.event.workflow_run.head_branch || github.event.inputs.pr_number || 'all' }}
  cancel-in-progress: false

jobs:
  auto-merge:
    # Chỉ chạy khi QA xanh (workflow_run) hoặc khi dispatch tay
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (policy + engine từ main)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Try auto-merge eligible PRs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          WR_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          WR_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          INPUT_PR: ${{ github.event.inputs.pr_number }}
        run: python3 scripts/try_auto_merge.py
