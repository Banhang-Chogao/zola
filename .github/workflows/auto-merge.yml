name: Auto-merge

# ZERO_BARRIER: QA Gatekeeper xanh → tự squash-merge PR mở vào main → deploy.
# Engine: scripts/try_auto_merge.py · Policy: data/auto-merge-policy.json
#
# Trigger:
#   - schedule (5'): NGUỒN TIN CẬY CHÍNH — quét mọi PR mở, merge cái nào qa-check
#     xanh + mergeable. workflow_run KHÔNG fire ổn định cho run trên branch feature
#     (head_branch hay về main) nên không thể dựa vào nó cho PR thật.
#   - workflow_run: fast-path khi nó có fire (đỡ phải chờ tới nhịp cron).
#   - workflow_dispatch: chạy tay (tuỳ chọn input pr_number).

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_run:
    workflows: ["QA Gatekeeper"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR cụ thể để thử auto-merge (bỏ trống = quét mọi PR mở đủ điều kiện)"
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: auto-merge-${{ github.event.workflow_run.head_branch || github.event.inputs.pr_number || 'all' }}
  cancel-in-progress: false

jobs:
  deploy_check:
    # Preflight: check if production deploy is already queued or in_progress.
    # If so, skip auto-merge to avoid piling up merges that each trigger deploy.
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      deploy_busy: ${{ steps.check.outputs.deploy_busy }}
    steps:
      - name: Check deploy queue status
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "🔍 Checking if production deploy is active..."
          # Query for in_progress or queued deploy runs
          ACTIVE=$(gh api "repos/${GH_REPO}/actions/workflows/deploy.yml/runs?status=in_progress&per_page=3" \
            --jq '.workflow_runs | length' 2>/dev/null || echo "0")
          QUEUED=$(gh api "repos/${GH_REPO}/actions/workflows/deploy.yml/runs?status=queued&per_page=3" \
            --jq '.workflow_runs | length' 2>/dev/null || echo "0")
          TOTAL=$(( ACTIVE + QUEUED ))
          if [ "$TOTAL" -gt 0 ]; then
            echo "⏳ Production deploy is busy: ${ACTIVE} in_progress, ${QUEUED} queued"
            echo "deploy_busy=true" >> "$GITHUB_OUTPUT"
          else
            echo "✅ Production deploy queue is clear"
            echo "deploy_busy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip auto-merge (deploy busy)
        if: steps.check.outputs.deploy_busy == 'true'
        run: |
          echo "⏳ Production deploy is in_progress or queued. Delaying auto-merge."
          echo "   Will re-attempt on next scheduled run (~5 min)."

  auto-merge:
    needs: deploy_check
    if: needs.deploy_check.outputs.deploy_busy != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (policy + engine từ main)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Try auto-merge eligible PRs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          WR_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          WR_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          INPUT_PR: ${{ github.event.inputs.pr_number }}
        run: python3 scripts/try_auto_merge.py
