name: PR Policy

# pull_request: human + PAT-created PRs (not github-actions[bot] — see ACTIONS-PERMISSIONS.md).
# workflow_dispatch: dispatched by push_via_pr.sh on bot maintenance branch.
# workflow_run: fallback relay after bot data workflows complete.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, edited]
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Fetch Build Dashboard"
      - "Compliance Score Audit"
      - "Fetch Merge Report"
      - "Build Semantic Related Posts"
      - "Fetch Google Trends VN"
      - "Fetch GA Stats"
      - "Fetch PageSpeed Insights"
      - "Optimize images (WebP)"
      - "Security Audit"
      - "Auto-update changelog.json"
      - "Scheduled publish (đăng bài hẹn giờ)"
      - "Build Failure Auto-Remediation"
      - "Self-Healing QA"
      - "Autofix Merge Conflicts"
      - "Performance QA Checker"
      - "QA Rule Checker"
    types: [completed]

permissions:
  contents: read
  pull-requests: read

env:
  TARGET_BRANCH: main
  MIN_TITLE_LEN: "12"
  MIN_BODY_LEN: "30"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  policy:
    if: >-
      (
        github.event_name != 'pull_request'
        || github.event.pull_request.user.login != 'github-actions[bot]'
      )
      && (
        github.event_name != 'workflow_run'
        || (
          github.event.workflow_run.conclusion == 'success'
          && github.event.workflow_run.head_repository.full_name == github.repository
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR metadata (workflow_run relay)
        if: github.event_name == 'workflow_run'
        id: relay
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x .github/scripts/resolve_open_bot_pr.sh
          .github/scripts/resolve_open_bot_pr.sh "${{ github.event.workflow_run.head_sha }}"

      - name: Resolve PR metadata (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ref="${{ github.ref_name }}"
          pr=$(gh pr list --repo "${GITHUB_REPOSITORY}" --head "$ref" --base main --state open \
            --json number,title,body,headRefOid,baseRefOid,headRefName,author --jq '.[0]')
          if [ -z "$pr" ] || [ "$pr" = "null" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No open PR for branch ${ref}"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "actor=$(echo "$pr" | jq -r '.author.login // .user.login // empty')" >> "$GITHUB_OUTPUT"
          echo "title<<EOF" >> "$GITHUB_OUTPUT"
          echo "$pr" | jq -r '.title' >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$pr" | jq -r '.body // ""' >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "base_sha=$(echo "$pr" | jq -r '.baseRefOid')" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(echo "$pr" | jq -r '.headRefOid')" >> "$GITHUB_OUTPUT"
          echo "head_ref=$(echo "$pr" | jq -r '.headRefName')" >> "$GITHUB_OUTPUT"

      - name: Skip — no PR to check
        if: >-
          (github.event_name == 'workflow_run' && steps.relay.outputs.skip == 'true')
          || (github.event_name == 'workflow_dispatch' && steps.dispatch.outputs.skip == 'true')
        run: echo "PR Policy skipped — no open PR."

      - uses: actions/checkout@v6
        if: >-
          github.event_name == 'pull_request'
          || (github.event_name == 'workflow_run' && steps.relay.outputs.skip != 'true')
          || (github.event_name == 'workflow_dispatch' && steps.dispatch.outputs.skip != 'true')
        with:
          fetch-depth: 0
          ref: >-
            ${{ steps.dispatch.outputs.head_sha
                || steps.relay.outputs.head_sha
                || github.event.workflow_run.head_sha
                || github.event.pull_request.head.sha
                || github.sha }}

      - name: Run PR policy checks
        if: >-
          github.event_name == 'pull_request'
          || (github.event_name == 'workflow_run' && steps.relay.outputs.skip != 'true')
          || (github.event_name == 'workflow_dispatch' && steps.dispatch.outputs.skip != 'true')
        env:
          ACTOR: >-
            ${{ github.event.pull_request.user.login
                || steps.dispatch.outputs.actor
                || steps.relay.outputs.actor }}
          PR_TITLE: >-
            ${{ github.event.pull_request.title
                || steps.dispatch.outputs.title
                || steps.relay.outputs.title }}
          PR_BODY: >-
            ${{ github.event.pull_request.body
                || steps.dispatch.outputs.body
                || steps.relay.outputs.body }}
          BASE_SHA: >-
            ${{ github.event.pull_request.base.sha
                || steps.dispatch.outputs.base_sha
                || steps.relay.outputs.base_sha }}
          HEAD_SHA: >-
            ${{ github.event.pull_request.head.sha
                || steps.dispatch.outputs.head_sha
                || steps.relay.outputs.head_sha }}
          HEAD_REF: >-
            ${{ github.event.pull_request.head.ref
                || steps.dispatch.outputs.head_ref
                || steps.relay.outputs.head_ref }}
        run: |
          chmod +x .github/scripts/pr_policy_checks.sh
          .github/scripts/pr_policy_checks.sh