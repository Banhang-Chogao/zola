name: PR Policy

# pull_request: human + PAT-created PRs.
# workflow_run: relay CI cho PR do GITHUB_TOKEN tạo (github-actions[bot]) — không cần approve thủ công.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, edited]
  workflow_run:
    workflows:
      - "Fetch Build Dashboard"
      - "Compliance Score Audit"
      - "Fetch Merge Report"
      - "Build Semantic Related Posts"
      - "Fetch Google Trends VN"
      - "Fetch GA Stats"
      - "Fetch PageSpeed Insights"
      - "Optimize images (WebP)"
      - "Security Audit"
      - "Auto-update changelog.json"
      - "Scheduled publish (đăng bài hẹn giờ)"
      - "Build Failure Auto-Remediation"
      - "Self-Healing QA"
      - "Autofix Merge Conflicts"
      - "Performance QA Checker"
    types: [completed]

permissions:
  contents: read
  pull-requests: read

env:
  TARGET_BRANCH: main
  MIN_TITLE_LEN: "12"
  MIN_BODY_LEN: "30"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  policy:
    if: >-
      github.event_name != 'workflow_run'
      || (github.event.workflow_run.conclusion == 'success'
          && github.event.workflow_run.head_branch != 'main'
          && github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR metadata (bot relay)
        if: github.event_name == 'workflow_run'
        id: relay
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          sha="${{ github.event.workflow_run.head_sha }}"
          pr=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${sha}/pulls" --jq '.[0]')
          if [ -z "$pr" ] || [ "$pr" = "null" ]; then
            echo "No PR for commit ${sha:0:7} — skip relay"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "actor=$(echo "$pr" | jq -r '.user.login')" >> "$GITHUB_OUTPUT"
          echo "title<<EOF" >> "$GITHUB_OUTPUT"
          echo "$pr" | jq -r '.title' >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$pr" | jq -r '.body // ""' >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "base_sha=$(echo "$pr" | jq -r '.base.sha')" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(echo "$pr" | jq -r '.head.sha')" >> "$GITHUB_OUTPUT"
          echo "head_ref=$(echo "$pr" | jq -r '.head.ref')" >> "$GITHUB_OUTPUT"

      - name: Skip — no PR for relay
        if: github.event_name == 'workflow_run' && steps.relay.outputs.skip == 'true'
        run: echo "Relay skipped (no open PR)."

      - uses: actions/checkout@v6
        if: github.event_name == 'pull_request' || steps.relay.outputs.skip != 'true'
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.event.pull_request.head.sha }}

      - name: Run PR policy checks
        if: github.event_name == 'pull_request' || steps.relay.outputs.skip != 'true'
        env:
          ACTOR: ${{ github.event.pull_request.user.login || steps.relay.outputs.actor }}
          PR_TITLE: ${{ github.event.pull_request.title || steps.relay.outputs.title }}
          PR_BODY: ${{ github.event.pull_request.body || steps.relay.outputs.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || steps.relay.outputs.base_sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || steps.relay.outputs.head_sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref || steps.relay.outputs.head_ref }}
        run: |
          chmod +x .github/scripts/pr_policy_checks.sh
          .github/scripts/pr_policy_checks.sh