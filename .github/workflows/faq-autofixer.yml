name: FAQ Autofixer

on:
  schedule:
    # Daily 02:30 ICT (19:30 UTC previous day)
    - cron: '30 19 * * *'
  workflow_dispatch:

concurrency:
  group: faq-autofixer
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  faq-autofixer:
    runs-on: ubuntu-latest
    name: Scan & Auto-fix FAQ
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -q pyyaml toml

      - name: Run FAQ audit (scan mode)
        id: audit
        run: |
          cd scripts
          python3 faq_fixer_auto.py --scan > /tmp/audit.log 2>&1
          cat /tmp/audit.log
          # Extract summary for PR body
          echo "audit_log<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/audit.log >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check report
        id: check_report
        run: |
          if [ -f "data/faq-autofixer-report.json" ]; then
            python3 << 'EOF'
            import json
            with open("data/faq-autofixer-report.json") as f:
              report = json.load(f)
            eligible = report.get("eligible_count", 0)
            print(f"eligible={eligible}")
            if eligible > 0:
              print("::set-output name=has_changes::true")
              files = "\n".join(f["path"] for f in report["eligible_files"])
              print(f"::set-output name=files::{files}")
            else:
              print("::set-output name=has_changes::false")
            EOF
          fi
        shell: bash

      - name: Apply FAQ fixes
        if: steps.check_report.outputs.has_changes == 'true'
        run: |
          cd scripts
          python3 faq_fixer_auto.py --apply

      - name: Check for changes
        id: git_check
        run: |
          git diff --name-only > /tmp/changed_files.txt
          if [ -s /tmp/changed_files.txt ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            cat /tmp/changed_files.txt
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.git_check.outputs.has_changes == 'true'
        run: |
          git config user.name "Claude FAQ Autofixer"
          git config user.email "noreply@anthropic.com"
          git add -A
          git commit -m "$(printf 'chore: auto-add FAQ to posts\n\nAuto-generated FAQ questions for improved SEO and AI overview support.\n- Scanned posts modified in last 7 days\n- Category-aware generation (banking, finance, SEO, AI, tutorial)\n- Preserved existing FAQs and post structure\n- No schema/routing changes\n\nReport: data/faq-autofixer-report.json')"

      - name: Create Pull Request
        if: steps.git_check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'chore: auto-add FAQ to posts'
          title: '[Chore] FAQ Autofixer — FAQ added to eligible posts'
          body: |
            ## FAQ Autofixer Run

            ### Summary
            - **Timestamp**: ${{ github.event.schedule || 'Manual' }}
            - **Mode**: Auto-apply

            ### Changes
            Added FAQ questions to eligible posts for improved SEO and AI Overview support.

            **Report**: See `data/faq-autofixer-report.json`

            ### Safety Checks
            - ✓ Existing FAQ preserved
            - ✓ Ineligible posts skipped (news, announcements, too short)
            - ✓ Category-aware (banking, finance, SEO, AI, tutorial)
            - ✓ No slug/permalink/canonical changes
            - ✓ Schema validation included

            ### Next Steps
            - [ ] Verify FAQ questions are accurate
            - [ ] Check styling renders correctly
            - [ ] Approve and merge when ready

          branch: chore/faq-autofixer-${{ github.run_number }}
          delete-branch: true
          labels: 'chore,faq,automation'

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: faq-autofixer-report
          path: |
            data/faq-autofixer-report.json
            data/faq-autofixer.log
          retention-days: 30

      - name: Print summary
        if: always()
        run: |
          echo "## FAQ Autofixer Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "data/faq-autofixer-report.json" ]; then
            python3 << 'EOF'
            import json
            with open("data/faq-autofixer-report.json") as f:
              report = json.load(f)
            print(f"**Eligible Posts**: {report['eligible_count']}")
            print(f"**Skipped**: {report['skipped_count']}")
            print(f"**Errors**: {report['error_count']}")
            EOF
          fi
