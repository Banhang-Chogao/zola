name: Auto Build Failed Healing

# SEOMONEY auto maintainer bot.
# Detect → Classify → Heal → Build → Learn → PR.
#
# Scans build/deploy/qa runs that FAILED in the last 48h, classifies the failure
# against the PUBLIC-SAFE healing registry (data/healing-patterns.json + CLAUDE.md
# + CULTURE_OF_DEPLOYMENT.md), applies a safe deterministic fix when matched, runs
# a targeted build, and opens a hotfix PR. NEVER pushes main directly.
#
# Private memory note: CLAUDE_PRIVATE.md is gitignored local-only memory. This
# workflow MUST NOT require it and NEVER reads/prints it. A clean checkout passes.

on:
  workflow_run:
    workflows:
      - deploy
      - qa
      - Build
      - Zola Deploy
      - GitHub Pages
      - "Build and deploy Zola site to GitHub Pages"
      - "QA Gatekeeper"
      - "Build Semantic Related Posts"
    types:
      - completed

  schedule:
    - cron: "0 * * * *"   # hourly — scan failed runs from the last 48h

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (scan + classify only, no fix, no PR)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write
  actions: read
  issues: write

concurrency:
  group: auto-build-failed-healing
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  heal:
    runs-on: ubuntu-latest
    # On workflow_run, only act when the upstream run actually failed.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'failure'
    steps:
      - name: Checkout main (full history)
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Zola (for targeted build validation)
        continue-on-error: true
        run: |
          curl -sLO https://github.com/getzola/zola/releases/download/v0.22.1/zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz
          sudo mv zola /usr/local/bin/ || true

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "args=--dry-run --hours 48" >> "$GITHUB_OUTPUT"
          else
            echo "args=--apply --hours 48" >> "$GITHUB_OUTPUT"
          fi

      - name: Preflight — check if failure is transient (rate-limit / queue / quota)
        id: preflight_heal
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FAILED_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          python3 << 'PY'
          import json, os, sys
          from urllib.request import Request, urlopen
          from urllib.error import HTTPError, URLError

          repo = os.environ.get("GITHUB_REPOSITORY", "")
          token = os.environ.get("GH_TOKEN", "")
          run_id = os.environ.get("FAILED_RUN_ID", "")

          if not run_id or not token:
              print("transient=false")
              print("reason=missing run_id or token — proceed with healing")
              sys.exit(0)

          # Fetch the failed run's logs/logs_url to check for rate-limit/queue patterns
          url = f"https://api.github.com/repos/{repo}/actions/runs/{run_id}"
          req = Request(url, headers={"Authorization": f"Bearer {token}",
                                       "Accept": "application/vnd.github+json",
                                       "User-Agent": "auto-heal-preflight/1.0"})
          try:
              with urlopen(req, timeout=12) as resp:
                  data = json.loads(resp.read().decode("utf-8"))
          except Exception:
              print("transient=false")
              print("reason=can't fetch run data — proceed with healing")
              sys.exit(0)

          conclusion = data.get("conclusion", "")
          name = (data.get("name") or "").lower()

          # Transient patterns that don't need a fix PR
          transient_keywords = [
              "rate limit", "quota", "timeout", "cancelled", "aborted",
              "concurrency", "already running", "skip_low_value",
              "pages-deploy-production",
          ]
          log_url = data.get("logs_url", "")
          transient = False
          reason = ""

          # Check conclusion + name for transient patterns
          if conclusion == "cancelled":
              transient = True
              reason = "Run was cancelled (concurrency/queue) — transient, not a code bug"
          elif conclusion == "skipped":
              transient = True
              reason = "Run was skipped — transient"

          # Check jobs for transient failures (e.g., deploy retries hitting rate limit)
          jobs_url = f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/jobs"
          try:
              jobs_req = Request(jobs_url, headers={"Authorization": f"Bearer {token}",
                                                     "Accept": "application/vnd.github+json",
                                                     "User-Agent": "auto-heal-preflight/1.0"})
              with urlopen(jobs_req, timeout=12) as resp:
                  jobs_data = json.loads(resp.read().decode("utf-8"))
              for job in jobs_data.get("jobs", []):
                  for step in job.get("steps", []):
                      if step.get("conclusion") == "failure":
                          log = ((step.get("name") or "") + " " +
                                 (step.get("conclusion") or "")).lower()
                          for kw in transient_keywords:
                              if kw in log:
                                  transient = True
                                  reason = f"Step '{step.get('name')}' hit '{kw}' — transient"
                                  break
                      if transient:
                          break
                  if transient:
                      break
          except Exception:
              pass

          if transient:
              print(f"transient=true")
              print(f"reason={reason}")
              print(f"::set-output name=is_transient::true")
              print(f"::set-output name=transient_reason::{reason}")
          else:
              print(f"transient=false")
              print(f"reason=No transient pattern detected — proceed with healing")
              print(f"::set-output name=is_transient::false")
              print(f"::set-output name=transient_reason::")
          PY

      - name: Skip healing for transient failures (rate-limit / queue / quota)
        if: steps.preflight_heal.outputs.is_transient == 'true'
        run: |
          echo "⏳ ${{ steps.preflight_heal.outputs.transient_reason }}"
          echo "   Skipping auto-healing — this is a transient infrastructure issue,"
          echo "   not a code bug. The deploy queue will retry automatically."

      - name: Run auto-build-failed-healing
        # 💉 Remediation/observer bot must never turn itself red (CLAUDE.md V3/V7).
        if: steps.preflight_heal.outputs.is_transient != 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ZOLA_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILED_RUN_ID: ${{ github.event.workflow_run.id }}
          FAILED_WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          FAILED_WORKFLOW_URL: ${{ github.event.workflow_run.html_url }}
          FAILED_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          python3 scripts/auto_build_failed_healing.py ${{ steps.mode.outputs.args }}

      - name: Upload healing report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-healing-report-${{ github.run_id }}
          path: |
            data/auto-healing-report.json
            data/auto-healing.log
          if-no-files-found: ignore
          retention-days: 14
