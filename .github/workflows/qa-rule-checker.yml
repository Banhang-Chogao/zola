name: QA Rule Checker

# Phát hiện rule/policy/workflow/automation xung đột → báo cáo + PR fix (không auto-merge).
# Schedule: mỗi 8 giờ UTC.

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: qa-rule-checker
  cancel-in-progress: false

jobs:
  rule-check:
    if: github.repository == 'Banhang-Chogao/zola'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run QA Rule Checker (scan, report, optional PR)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/qa-auto-rule-checker.py || true

      - name: Safety guard — never commit main
        run: |
          BR=$(git rev-parse --abbrev-ref HEAD)
          if [ "$BR" = "main" ]; then
            echo "::error::QA Rule Checker không được commit trực tiếp main"
            exit 1
          fi
          echo "Branch: $BR (OK)"