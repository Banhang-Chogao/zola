name: QA Rule Checker

# Quét rule xung đột + auto-fix → push thẳng main.
# Auto-trigger: schedule 8h + mọi workflow fail trên main.

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Build and deploy Zola site to GitHub Pages"
      - "QA Gatekeeper"
      - "Build Failure Auto-Remediation"
      - "Self-Healing QA"
      - "Compliance Score Audit"
      - "Fetch Build Dashboard"
      - "Fetch Merge Report"
      - "Build Semantic Related Posts"
      - "Performance Audit"
      - "Security Audit"
    types: [completed]

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: qa-rule-checker
  cancel-in-progress: false

jobs:
  rule-check:
    if: >-
      github.repository == 'Banhang-Chogao/zola' &&
      (
        github.event_name != 'workflow_run' ||
        (
          github.event.workflow_run.conclusion == 'failure' &&
          github.event.workflow_run.head_branch == 'main'
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run QA Rule Checker (scan, report, push fixes to main)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/qa-auto-rule-checker.py || true

