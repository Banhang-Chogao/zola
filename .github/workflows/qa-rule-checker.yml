name: QA Rule Checker

# Quét rule/policy/workflow xung đột giữa CLAUDE.md, scripts, và workflows.
# Chạy khi có thay đổi liên quan, daily schedule, hoặc theo yêu cầu thủ công.
# KHÔNG chạy theo workflow_run để tránh noise/queue.

on:
  pull_request:
    paths:
      - 'content/**'
      - 'templates/**'
      - 'static/**'
      - 'scripts/**'
      - 'config.toml'
      - 'CLAUDE.md'
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'templates/**'
      - 'static/**'
      - 'scripts/**'
      - 'config.toml'
      - 'CLAUDE.md'
      - '.github/workflows/**'
  schedule:
    # Daily low-traffic window (02:30 UTC = 09:30 ICT) — catch stale config drift
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: qa-rule-checker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rule-check:
    if: github.repository == 'Banhang-Chogao/zola'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run QA Rule Checker (scan, report, push fixes to main)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/qa-auto-rule-checker.py || true
