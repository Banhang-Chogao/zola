name: IndexNow ping

# Mỗi khi bài viết thay đổi (push vào content/posting hoặc content/baochi trên
# main) → tự báo Bing / Yandex / Seznam / Naver / DuckDuckGo qua IndexNow để
# index nhanh ở các engine đó. KHÔNG ảnh hưởng Google (Google không dùng
# IndexNow, cũng không phạt) — Google vẫn index qua sitemap.xml như thường.
on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'templates/**'
  workflow_dispatch:

permissions:
  contents: read

# Không cancel-in-progress: mỗi đợt đăng bài là 1 lần ping độc lập.
concurrency:
  group: indexnow
  cancel-in-progress: false

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Submit URLs to IndexNow
        run: python3 scripts/indexnow.py
