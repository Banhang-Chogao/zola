name: Auto-Resolve Conflicts (label-triggered)
on:
  pull_request:
    types: [labeled]

concurrency:
  group: auto-resolve-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  auto-resolve:
    if: github.event.label.name == 'auto-resolve'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyyaml json5 requests

      - name: Checkout PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin ${{ github.event.pull_request.head.ref }}
          git checkout ${{ github.event.pull_request.head.ref }}

      - name: Auto-resolve conflicts
        run: |
          python3 scripts/autofix_conflicts.py \
            --branch "${{ github.event.pull_request.head.ref }}" \
            --auto-resolve \
            --verbose

      - name: Run QA checks
        continue-on-error: true
        run: |
          python3 qa_check.py --strict || true

      - name: Push with retry
        run: |
          python3 scripts/push_with_retry.py \
            --branch "${{ github.event.pull_request.head.ref }}" \
            --max-retries 5

      - name: Remove auto-resolve label on success
        if: success()
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'auto-resolve'
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ **Conflicts auto-resolved successfully!**\n\nBranch has been updated and pushed. Removed `auto-resolve` label.\n\nPreflight check will run automatically and confirm readiness for merge.'
            });

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ **Auto-resolve failed.**\n\nManual intervention required. Check the workflow logs for details:\n\n[View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})'
            });
