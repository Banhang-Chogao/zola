name: Auto Performance Fix Engine

# Trigger: schedule (daily) + manual dispatch
on:
  schedule:
    # Run daily at 03:00 UTC = 10:00 Asia/Ho_Chi_Minh
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      pagespeed_key:
        description: PageSpeed Insights API key (optional)
        required: false
      dry_run:
        description: Dry-run only (no fixes applied)
        required: false
        type: boolean
        default: false

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-analytics-data google-auth
          # Zola build dependency
          curl https://github.com/getzola/zola/releases/download/v0.18.0/zola-v0.18.0-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C /usr/local/bin

      - name: Run Auto Performance Fix Engine
        id: auto-fix
        env:
          GA_SERVICE_ACCOUNT_KEY: ${{ secrets.GA_SERVICE_ACCOUNT_KEY }}
          PAGESPEED_API_KEY: ${{ github.event.inputs.pagespeed_key }}
        run: |
          python3 scripts/auto_performance_fix_engine.py \
            --pagespeed-key "$PAGESPEED_API_KEY" \
            ${{ github.event.inputs.dry_run && '--dry-run' || '' }}

      - name: Load report
        id: report
        run: |
          if [ -f data/auto-performance-fix-report.json ]; then
            STATUS=$(jq -r '.status' data/auto-performance-fix-report.json)
            ISSUES=$(jq -r '.issues_detected' data/auto-performance-fix-report.json)
            FIXES=$(jq -r '.fixes_applied' data/auto-performance-fix-report.json)
            PERF_MOBILE=$(jq -r '.pagespeed_score_mobile' data/auto-performance-fix-report.json)
            PERF_DESKTOP=$(jq -r '.pagespeed_score_desktop' data/auto-performance-fix-report.json)

            echo "status=$STATUS" >> $GITHUB_OUTPUT
            echo "issues=$ISSUES" >> $GITHUB_OUTPUT
            echo "fixes=$FIXES" >> $GITHUB_OUTPUT
            echo "perf_mobile=$PERF_MOBILE" >> $GITHUB_OUTPUT
            echo "perf_desktop=$PERF_DESKTOP" >> $GITHUB_OUTPUT
          fi

      - name: Create or update PR if changes
        if: steps.report.outputs.fixes > 0 && !github.event.inputs.dry_run
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('data/auto-performance-fix-report.json', 'utf8'));

            const title = `🚀 perf: Auto-fix performance issues (${report.fixes_applied} fixes)`;

            let issuesSection = 'None';
            if (report.issues.length > 0) {
              issuesSection = report.issues.map(i => `- **${i.category}** (${i.strategy}): ${i.severity}`).join('\n');
            }

            let fixesSection = 'None';
            if (report.fixes.length > 0) {
              fixesSection = report.fixes.map(f => `- ✅ ${f.type}: ${f.message}`).join('\n');
            }

            let ga4Lines = ['No data'];
            if (report.ga4_organic?.users) {
              ga4Lines = [
                `- Users (7d): ${report.ga4_organic.users}`,
                `- Sessions (7d): ${report.ga4_organic.sessions}`,
                `- Pageviews (7d): ${report.ga4_organic.pageviews}`
              ];
            }

            const bodyLines = [
              '## Auto Performance Fix Engine',
              '',
              `**Status:** ${report.status}`,
              '',
              '### Metrics',
              `- Mobile Performance: ${report.pagespeed_score_mobile}/100`,
              `- Desktop Performance: ${report.pagespeed_score_desktop}/100`,
              '',
              '### Issues Detected',
              issuesSection,
              '',
              '### Fixes Applied',
              fixesSection,
              '',
              '### Organic Search (GA4)',
              ...ga4Lines,
              '',
              '---',
              '',
              '_Generated by Auto Performance Fix Engine_',
              '',
              '**Rules:**',
              '- This PR will auto-merge if all checks pass',
              '- Review the diffs before approval',
              '- Revert via `git revert` if needed'
            ];
            const body = bodyLines.join('\n');

            // Find existing PR
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: 'auto-performance-fix',
              base: 'main',
            });

            if (prs.data.length > 0) {
              // Update existing PR
              const pr = prs.data[0];
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                title: title,
                body: body,
              });
              console.log(`Updated PR #${pr.number}`);
            } else {
              // Create new PR
              const pr = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                head: 'auto-performance-fix',
                base: 'main',
              });
              console.log(`Created PR #${pr.data.number}`);
            }

      - name: Post status summary
        if: always()
        run: |
          echo "## Auto Performance Fix Engine" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/auto-performance-fix-report.json ]; then
            STATUS=$(jq -r '.status' data/auto-performance-fix-report.json)
            ISSUES=$(jq -r '.issues_detected' data/auto-performance-fix-report.json)
            FIXES=$(jq -r '.fixes_applied' data/auto-performance-fix-report.json)
            PERF_MOBILE=$(jq -r '.pagespeed_score_mobile' data/auto-performance-fix-report.json)
            PERF_DESKTOP=$(jq -r '.pagespeed_score_desktop' data/auto-performance-fix-report.json)

            echo "**Status:** $STATUS" >> $GITHUB_STEP_SUMMARY
            echo "**Mobile Perf:** $PERF_MOBILE/100" >> $GITHUB_STEP_SUMMARY
            echo "**Desktop Perf:** $PERF_DESKTOP/100" >> $GITHUB_STEP_SUMMARY
            echo "**Issues Found:** $ISSUES" >> $GITHUB_STEP_SUMMARY
            echo "**Fixes Applied:** $FIXES" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ No report generated" >> $GITHUB_STEP_SUMMARY
          fi
