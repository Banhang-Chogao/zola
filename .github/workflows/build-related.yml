name: Build Semantic Related Posts

on:
  push:
    branches: [main]
    paths:
      - 'content/posting/**.md'
      - 'scripts/build_related.py'
      - 'scripts/requirements.txt'
  schedule:
    # Mỗi GIỜ — đủ tươi cho related posts mà KHÔNG đốt quota Actions.
    # (Trước đây '*/5' mỗi 5 phút ~576 min/ngày → vượt free tier sau ~3.5 ngày;
    #  đã throttle trực tiếp tại đây, gỡ workflow auto-throttle.yml one-shot.)
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

# Native Node.js 24 opt-in (best practice, không dùng FORCE env)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: build-related
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Cache HuggingFace model
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-paraphrase-multilingual-MiniLM-L12-v2

      - name: Install dependencies
        run: pip install --quiet -r scripts/requirements.txt

      - name: Build related index
        run: python scripts/build_related.py

      - name: Commit if changed (with race-safe retry)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Add cả related.json + scores.json (script emit cả 2)
          if git status --porcelain data/related.json data/scores.json | grep -q .; then
            git add data/related.json data/scores.json
            git commit -m "Cập nhật: rebuild semantic related posts ($(date +%Y-%m-%d))"
          else
            echo "No changes to commit."
            exit 0
          fi

          # Race-safe push: nếu reject vì non-fast-forward, fetch+rebase+retry
          # tối đa 3 lần. Bảo vệ race khi PR khác merge song song.
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Push thành công attempt $attempt"
              exit 0
            fi
            echo "Push rejected attempt $attempt, fetch+rebase main..."
            git fetch origin main
            git rebase origin/main || { echo "Rebase conflict, abort"; git rebase --abort; exit 1; }
            sleep $((attempt * 5))
          done
          echo "Push failed sau 3 retry — escalate"
          exit 1
