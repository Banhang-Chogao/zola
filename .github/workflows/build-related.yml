name: Build Semantic Related Posts

on:
  push:
    branches: [main]
    paths:
      - 'content/posting/**.md'
      - 'scripts/build_related.py'
      - 'scripts/requirements.txt'
  schedule:
    # Sunday 02:00 UTC weekly — rebuild dù không có post mới
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: write

# Native Node.js 24 opt-in (best practice, không dùng FORCE env)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: build-related
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-paraphrase-multilingual-MiniLM-L12-v2

      - name: Install dependencies
        run: pip install --quiet -r scripts/requirements.txt

      - name: Build related index
        run: python scripts/build_related.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/related.json)" ]]; then
            git add data/related.json
            git commit -m "Cập nhật: rebuild semantic related posts ($(date +%Y-%m-%d))"
            git push
          else
            echo "No changes to commit."
          fi
