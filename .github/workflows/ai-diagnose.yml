name: AI Diagnose Build Failure

# Trigger khi workflow "Build and deploy Zola site to GitHub Pages"
# (deploy.yml) hoàn thành với conclusion = failure. Chạy scripts/ff.py
# với ANTHROPIC_API_KEY (GitHub Secret) để gọi Claude diagnose lỗi,
# rồi tạo Issue mới với suggestion để user review.
#
# Yêu cầu Secret:
#   - ANTHROPIC_API_KEY (đã add từ GitHub Settings → Secrets)
#
# Idempotency: nếu deploy lại pass → workflow này KHÔNG trigger nữa
# (chỉ chạy trên conclusion=failure). Mỗi commit fail = 1 issue mới.

on:
  workflow_run:
    workflows: ["Build and deploy Zola site to GitHub Pages"]
    types: [completed]

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  diagnose:
    # Chỉ chạy khi deploy fail
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout failing commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Zola binary (v0.19.2)
        run: |
          ZOLA_VERSION="0.19.2"
          curl -sSL -o zola.tar.gz \
            "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar xzf zola.tar.gz
          sudo mv zola /usr/local/bin/
          zola --version

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip wheels
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ff-deps-${{ hashFiles('scripts/requirements-ff.txt') }}

      - name: Install ff.py dependencies
        run: pip install -r scripts/requirements-ff.txt

      - name: Run ff.py — capture suggestion
        id: diagnose
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FF_AI_PROVIDER: anthropic
          FF_AI_MODEL: claude-opus-4-7
        run: |
          set +e
          mkdir -p /tmp/ff
          python3 scripts/ff.py 2>&1 | tee /tmp/ff/output.txt
          EXIT=${PIPESTATUS[0]}
          echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"
          # Cap 60k chars (GitHub Issue body limit ~65536)
          head -c 60000 /tmp/ff/output.txt > /tmp/ff/trim.txt
          echo "Output bytes: $(wc -c < /tmp/ff/trim.txt)"

      - name: Create issue with AI suggestion
        if: steps.diagnose.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/ff/trim.txt', 'utf8');
            const run = context.payload.workflow_run;
            const shortSha = run.head_sha.substring(0, 7);

            // Idempotency: tìm open issue cùng commit để tránh duplicate
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'auto-diagnose',
              per_page: 30,
            });
            const dup = existing.find(i => i.title.includes(shortSha));
            if (dup) {
              core.info(`Đã có issue ${dup.html_url} cho commit ${shortSha}, skip.`);
              return;
            }

            const body = [
              '## AI Build Diagnose',
              '',
              `**Failed run**: ${run.html_url}`,
              `**Commit**: \`${shortSha}\``,
              `**Branch**: \`${run.head_branch}\``,
              `**Workflow**: ${run.name}`,
              '',
              '---',
              '',
              '<details open><summary><strong>ff.py output (Claude suggestion)</strong></summary>',
              '',
              '```',
              output,
              '```',
              '',
              '</details>',
              '',
              '---',
              '',
              'Auto-generated by `.github/workflows/ai-diagnose.yml` + `scripts/ff.py`.',
              'Cải thiện model: chạy `python3 scripts/ff.py --teach "..."` local.',
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `AI Diagnose: deploy fail @ ${shortSha}`,
              body: body,
              labels: ['auto-diagnose', 'build-failure'],
            });
            core.info(`Created issue: ${issue.data.html_url}`);
