name: Batch Merge

# feature branch → PR → manual review APPROVED → QA xanh
# workflow_dispatch → environment batch-production (manual approval)
# Merge CHỈ khi đủ đúng 10 PR approved; không auto-merge.

on:
  workflow_dispatch:

env:
  TARGET_BRANCH: main
  BATCH_SIZE: "10"
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: batch-merge
  cancel-in-progress: false

jobs:
  manual-approval:
    runs-on: ubuntu-latest
    environment: batch-production
    steps:
      - run: echo "batch-production approved — require exactly ${BATCH_SIZE} PRs"

  merge-batch:
    needs: manual-approval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Merge exactly 10 approved PRs
        run: |
          set -euo pipefail
          limit="${BATCH_SIZE}"

          gh pr list --base "${TARGET_BRANCH}" --state open --limit 100 \
            --json number,reviewDecision,mergeable,statusCheckRollup > /tmp/prs.json

          mapfile -t prs < <(jq -r '
            [.[]
              | select(.reviewDecision == "APPROVED")
              | select(.mergeable == "MERGEABLE")
              | select(
                  (.statusCheckRollup | length) == 0
                  or (.statusCheckRollup | all(
                    .conclusion == "SUCCESS"
                    or .conclusion == "SKIPPED"
                    or .conclusion == "NEUTRAL"
                    or .conclusion == null
                  ))
                )
            ] | .[].number
          ' /tmp/prs.json)

          ready=${#prs[@]}
          if [ "$ready" -ne "$limit" ]; then
            echo "::error::Batch merge requires exactly ${limit} approved PRs; found ${ready}."
            exit 1
          fi

          merged=0
          for num in "${prs[@]}"; do
            gh pr merge "$num" --merge --delete-branch
            echo "merged=#${num}"
            merged=$((merged + 1))
          done

          echo "total_merged=${merged}"