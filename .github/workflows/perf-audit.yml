name: Performance QA Checker

# Cron hằng ngày 00:00 Asia/Ho_Chi_Minh (GMT+7) = 17:00 UTC ngày hôm trước.
# Audit Lighthouse/PageSpeed, so sánh regression, SAFE auto-fix → PR riêng.
# TUYỆT ĐỐI KHÔNG push/merge main — chỉ branch qa/performance-auto-fix-YYYYMMDD.
#
# workflow_dispatch: chạy thủ công bất kỳ lúc nào.

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

concurrency:
  group: perf-audit
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  performance-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (read-only baseline)
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run Lighthouse/PageSpeed audit + local perf scan
        id: audit
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
        run: |
          set +e
          python3 scripts/performance_qa_checker.py \
            --report-only \
            --output reports/performance/latest.json \
            2>&1 | tee perf-scan.txt
          audit_exit=$?
          echo "exit_code=${audit_exit}" >> "$GITHUB_OUTPUT"
          # exit 0 hoặc 2 đều OK — 2 = cần action (score thấp / regression)
          if [ "$audit_exit" -gt 2 ]; then exit "$audit_exit"; fi

      - name: Apply SAFE perf auto-fix (img lazy/decoding)
        id: fix
        if: steps.audit.outputs.exit_code == '2' || steps.audit.outputs.exit_code == '0'
        run: |
          python3 scripts/performance_qa_checker.py \
            --fix \
            --write-pr-body pr-body.md \
            --output reports/performance/latest-with-fix.json \
            2>&1 | tee perf-fix.txt
          if git diff --quiet templates/ static/ sass/ content/ config.toml data/performance-audit-snapshot.json 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "✓ Không có file SAFE fix nào thay đổi"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload audit report artifact
        uses: actions/upload-artifact@v4
        with:
          name: performance-audit-${{ github.run_id }}
          path: |
            reports/performance/
            perf-scan.txt
            perf-fix.txt
            pr-body.md
          retention-days: 90
          if-no-files-found: warn

      - name: Create performance fix branch + PR (NEVER push main)
        if: steps.audit.outputs.exit_code == '2' || steps.fix.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="qa/performance-auto-fix-$(TZ=Asia/Ho_Chi_Minh date +%Y%m%d)"
          echo "BRANCH=${BRANCH}" >> "$GITHUB_ENV"

          git checkout -B "${BRANCH}"
          # CHỈ add source + snapshot — KHÔNG add log files (đã .gitignore)
          git add templates/ static/ sass/ content/ config.toml \
            data/performance-audit-snapshot.json reports/performance/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No committable SAFE fixes — tạo issue thay vì PR trống"
            gh issue create \
              --title "QA: Performance below threshold ($(date -u +%F))" \
              --body-file pr-body.md \
              --label "performance" 2>/dev/null || \
              gh issue create \
                --title "QA: Performance below threshold ($(date -u +%F))" \
                --body-file pr-body.md || true
            exit 0
          fi

          git commit -m "QA: Performance optimization proposal ($(date -u +%FT%TZ))"

          # PUSH branch riêng — KHÔNG BAO GIỜ push HEAD:main
          git push -f origin "${BRANCH}"

          SCORE=$(python3 -c "import json; d=json.load(open('reports/performance/latest-with-fix.json')); print(d.get('primary_score','?'))" 2>/dev/null || echo "?")

          existing=$(gh pr list --head "${BRANCH}" --state open --json number --jq '.[0].number')
          if [ -z "$existing" ]; then
            if ! gh pr create \
              --base main --head "${BRANCH}" \
              --title "QA: Performance optimization proposal for blog (score ${SCORE}/100)" \
              --body-file pr-body.md; then
              echo "⚠ Không tạo được PR — tạo tay:"
              echo "https://github.com/${{ github.repository }}/pull/new/${BRANCH}"
            fi
          else
            gh pr comment "${existing}" --body-file pr-body.md || true
          fi

      - name: Zola build smoke test (on fix branch if exists)
        if: steps.fix.outputs.changed == 'true'
        env:
          ZOLA_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sLO https://github.com/getzola/zola/releases/download/v0.22.1/zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz
          sudo mv zola /usr/local/bin/
          zola build

      - name: Safety guard — block accidental main push
        run: |
          CURRENT=$(git rev-parse --abbrev-ref HEAD)
          if [ "$CURRENT" = "main" ]; then
            echo "❌ BLOCKED: workflow đang ở main — không được push trực tiếp"
            exit 1
          fi
          echo "✓ Branch hiện tại: ${CURRENT} (không phải main)"