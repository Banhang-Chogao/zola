version: 2

# Zola static blog — chỉ bump GitHub Actions (không npm/Cargo/Gem/pip ở root).
# Security alerts + security PRs: bật trong repo Settings (độc lập file này).
# Không auto-merge — merge thủ công sau khi CI (QA Gatekeeper, v.v.) xanh.

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
    ignore:
      - dependency-name: actions/deploy-pages
        update-types: [version-update:semver-major]
      - dependency-name: actions/configure-pages
        update-types: [version-update:semver-major]
      - dependency-name: actions/upload-pages-artifact
        update-types: [version-update:semver-major]
      - dependency-name: shalzz/zola-deploy-action
        update-types: [version-update:semver-major]