{% extends "base.html" %}

{% block content %}
<div class="container">
    <article class="post">
        <header class="post-header">
            <h1>{{ page.title }}</h1>
            {% if page.date %}
            <p class="post-meta">
                <time datetime="{{ page.date }}">
                    {{ page.date | date(format="%Y-%m-%d") }}
                </time>
            </p>
            {% endif %}
        </header>

        <div class="post-content">
            {{ page.content | safe }}
        </div>
    </article>
</div>
{% endblock %}
