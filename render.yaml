# Render Blueprint — 1-click deploy cho blog backend (VIPZone + Paywall).
#
# Cách dùng:
#   1. Vào https://dashboard.render.com/blueprints
#   2. Click "New Blueprint Instance"
#   3. Connect repo Banhang-Chogao/zola
#   4. Render đọc file này → tạo Web Services
#   5. Bạn điền các env vars sync:false bên dưới → click Apply
#   6. Sau khi Web Service running, copy URL, dán vào config.toml
#      `cms_auth_url    = "https://blog-vipzone-api.onrender.com"`
#      `vipzone_api_url = "https://blog-vipzone-api.onrender.com"`
#
# Backend hoạt động hiện tại = VIPZone (`blog-vipzone-api`, rootDir services/vipzone).
# Service `visitor-counter` cũ đã bỏ — KHÔNG deploy lại, KHÔNG trỏ blog-visitor-api.
#
# Docs: https://render.com/docs/blueprint-spec

services:
  # ============= VIPZone API (FastAPI + SQLite) — CMS auth + VIP + GSC =============
  # Cổng OAuth của CMS/Editor chạy TRÊN service này (GitHub + Google), không phải
  # service visitor-counter cũ. Callback OAuth trỏ thẳng blog-vipzone-api.
  - type: web
    name: blog-vipzone-api
    runtime: python
    region: singapore
    plan: free
    rootDir: services/vipzone
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: VIPZONE_CORS_ORIGIN
        value: https://seomoney.org
      - key: VIPZONE_BLOG_URL
        value: https://seomoney.org
      - key: VIPZONE_DB_PATH
        value: /tmp/vipzone.db
      - key: VIPZONE_BACKEND_URL
        value: https://blog-vipzone-api.onrender.com
      # BACKEND_URL cũng dùng làm gốc suy ra GOOGLE_REDIRECT_URI khi không set tay.
      - key: BACKEND_URL
        value: https://blog-vipzone-api.onrender.com
      - key: ADMIN_EMAILS
        value: 292648126+banhang-chogao@users.noreply.github.com
      - key: ADMIN_USERNAMES
        value: banhang-chogao
      - key: SUPERADMIN_GITHUB_USERNAMES
        value: banhang-chogao
      - key: SUPERADMIN_REPO_OWNER
        value: Banhang-Chogao
      - key: SUPERADMIN_REPO_NAME
        value: zola
      - key: VIPZONE_MOMO_MONTHLY
        value: https://me.momo.vn/G5T1CDFRuJFWfBCDiK/MvbmqW94lpp0bYA
      - key: VIPZONE_MOMO_SEMIANNUAL
        value: https://me.momo.vn/G5T1CDFRuJFWfBCDiK/lNbWPA9NgD64dyg
      - key: VIPZONE_CATALOG_URL
        value: https://seomoney.org/data/vipzone-picker-catalog.json

      # ----- Auth provider rollout (GitHub → Google) -----
      # github (default) | dual (Google + GitHub) | google. Rollback = github.
      - key: AUTH_PROVIDER
        value: dual

      # ----- GitHub OAuth (callback https://blog-vipzone-api.onrender.com/auth/callback) -----
      # Sync=false → điền sau, KHÔNG bake secret vào blueprint public.
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false

      # ----- Google OAuth / OIDC (callback .../auth/google/callback) -----
      # Tạo "Web application" client ở Google Cloud Console; Authorized redirect URI
      # phải = GOOGLE_REDIRECT_URI bên dưới (khớp CHÍNH XÁC).
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://blog-vipzone-api.onrender.com/auth/google/callback
      # Email Google được phép vào CMS — comma-separated. Để trống → fallback ADMIN_EMAILS.
      - key: GOOGLE_ADMIN_EMAILS
        sync: false

      # ----- Native comments (Google login cho người bình luận) -----
      # Người bình luận đăng nhập Google qua /auth/comment/start (KHÔNG vào được CMS).
      # GOOGLE_ADMIN_EMAILS vẫn là ranh giới admin/moderate. Mặc định an toàn AdSense:
      # bình luận mới = pending (chờ duyệt). Reuse GOOGLE_CLIENT_ID/SECRET ở trên.
      - key: COMMENTS_ENABLED
        value: "true"
      - key: COMMENTS_AUTH_PROVIDER
        value: google
      - key: COMMENTS_DEFAULT_STATUS
        value: pending
      - key: COMMENTS_MAX_LENGTH
        value: "1500"
      # Giới hạn domain email được bình luận (comma-separated, vd "company.com").
      # Để trống = mọi tài khoản Google đã xác minh đều bình luận được.
      - key: COMMENTS_ALLOWED_DOMAINS
        sync: false

      # ----- Google Search Console (SEO Reality Check, /gsc/* routes) -----
      - key: GSC_CLIENT_ID
        sync: false
      - key: GSC_CLIENT_SECRET
        sync: false
      - key: GSC_PROPERTY_URL
        value: sc-domain:seomoney.org
      - key: GSC_REFRESH_TOKEN
        sync: false

  # ============= Paywall API (FastAPI + SQLite) =============
  - type: web
    name: blog-paywall-api
    runtime: python
    region: singapore
    plan: free
    rootDir: services/paywall
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    disk:
      name: paywall-data
      mountPath: /var/data
      sizeGB: 1

    envVars:
      - key: PAYWALL_CORS_ORIGIN
        value: https://banhang-chogao.github.io
      - key: PAYWALL_BLOG_DOMAIN
        value: banhang-chogao.github.io
      - key: PAYWALL_BLOG_NAME
        value: Duy Nguyen Blog
      - key: PAYWALL_DB_PATH
        value: /var/data/paywall.db
      - key: MOMO_PAYMENT_LINK
        value: https://me.momo.vn/G5T1CDFRuJFWfBCDiK/YQdJ8k98OO4vaOG
      - key: PAYWALL_ADMIN_TOKEN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
