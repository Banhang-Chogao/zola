# Render Blueprint — VIPZone API (Render Free tier, no persistent disk).
#
# Deploy:
#   1. https://dashboard.render.com/blueprints → New Blueprint Instance
#   2. Connect repo Banhang-Chogao/zola
#   3. Branch: feat/vipzone (or main after merge)
#   4. Blueprint path: render.yaml
#   5. Apply → fill sync:false env vars in dashboard
#   6. Copy service URL → config.toml `vipzone_api_url`
#
# Persistence: SQLite at /tmp (ephemeral — survives restarts, lost on redeploy).
# For durable storage later, point VIPZONE_DB_PATH at an external DB via env.
#
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: blog-vipzone-api
    runtime: python
    region: singapore
    plan: free
    rootDir: services/vipzone
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: VIPZONE_CORS_ORIGIN
        value: https://seomoney.org
      - key: VIPZONE_BLOG_URL
        value: https://seomoney.org
      # Ephemeral SQLite — no Render disk on free tier
      - key: VIPZONE_DB_PATH
        value: /tmp/vipzone.db
      - key: VIPZONE_BACKEND_URL
        value: https://blog-vipzone-api.onrender.com
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: ADMIN_EMAILS
        value: 292648126+banhang-chogao@users.noreply.github.com
      - key: ADMIN_USERNAMES
        value: banhang-chogao
      - key: SUPERADMIN_GITHUB_USERNAMES
        value: banhang-chogao
      - key: SUPERADMIN_REPO_OWNER
        value: Banhang-Chogao
      - key: SUPERADMIN_REPO_NAME
        value: zola
      - key: VIPZONE_MOMO_MONTHLY
        value: https://me.momo.vn/G5T1CDFRuJFWfBCDiK/MvbmqW94lpp0bYA
      - key: VIPZONE_MOMO_SEMIANNUAL
        value: https://me.momo.vn/G5T1CDFRuJFWfBCDiK/lNbWPA9NgD64dyg
      - key: VIPZONE_CATALOG_URL
        value: https://seomoney.org/data/vipzone-picker-catalog.json
      # Google Search Console OAuth (refresh-token bootstrap via /gsc/oauth/start).
      # Callback registered in the Google OAuth client:
      #   https://blog-vipzone-api.onrender.com/gsc/oauth/callback
      - key: GSC_CLIENT_ID
        sync: false
      - key: GSC_CLIENT_SECRET
        sync: false
      - key: GSC_PROPERTY_URL
        value: sc-domain:seomoney.org
      # Set after completing /gsc/oauth/start (copy from /gsc/oauth/token).
      - key: GSC_REFRESH_TOKEN
        sync: false
