<link rel="stylesheet" href="{{ get_url(path='css/turnstile-footer.css', cachebust=true) }}">

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer
  data-domain="seomoney.org"
></script>

<section class="sm-turnstile-footer" data-nosnippet aria-label="Cloudflare Turnstile security">
  <div class="sm-turnstile-footer__inner">
    <div class="sm-turnstile-footer__copy">
      <p class="sm-turnstile-footer__eyebrow">Security check</p>
      <p class="sm-turnstile-footer__title">Protected by Cloudflare Turnstile</p>
      <p class="sm-turnstile-footer__desc">Blog được bảo vệ bởi Cloudflare Turnstile — tự động kiểm tra bot mà không làm phiền trải nghiệm đọc.</p>
    </div>

    <div class="sm-turnstile-footer__widget">
      <div
        class="cf-turnstile"
        data-sitekey="0x4AAAAAADoXN8ZuN6jmHe5m"
        data-action="turnstile-spin-v1"
        data-theme="auto"
        data-callback="onTurnstileSuccess"
        data-clearance="managed"
      ></div>
    </div>
  </div>
</section>

<script>
window._turnstileVerifyUrl = "{{ config.extra.turnstile_verify_url | default(value='https://turnstile-siteverify-seomoney.tamsudev-com.workers.dev') }}";
window._turnstileToken = "";
function onTurnstileSuccess(token) {
  window._turnstileToken = token;
}
</script>
