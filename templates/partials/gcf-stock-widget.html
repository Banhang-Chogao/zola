<aside class="gcf-stock" data-gcf-stock aria-labelledby="gcf-stock-title">
    <div class="gcf-stock__inner">
        <div class="gcf-stock__identity">
            <span class="gcf-stock__symbol" aria-label="Mã cổ phiếu GCF">GCF</span>
            <div>
                <h2 class="gcf-stock__name" id="gcf-stock-title" data-gcf-name>CTCP Thực phẩm G.C</h2>
                <p class="gcf-stock__market">UPCoM · Dữ liệu tham khảo</p>
            </div>
        </div>

        <div class="gcf-stock__quote">
            <strong class="gcf-stock__price" data-gcf-price>18,500</strong>
            <span class="gcf-stock__change is-positive" data-gcf-change>+400 (+2.21%)</span>
        </div>

        <dl class="gcf-stock__metrics">
            <div>
                <dt>Cao nhất</dt>
                <dd data-gcf-high>18,500</dd>
            </div>
            <div>
                <dt>Thấp nhất</dt>
                <dd data-gcf-low>18,400</dd>
            </div>
            <div>
                <dt>KL TB 10 phiên</dt>
                <dd data-gcf-volume>30,410</dd>
            </div>
        </dl>

        <div class="gcf-stock__controls">
            <p class="gcf-stock__updated" data-gcf-updated aria-live="polite">Đang cập nhật…</p>
            <button class="gcf-stock__refresh" type="button" data-gcf-refresh>
                Cập nhật
            </button>
        </div>
    </div>
    <p class="gcf-stock__notice" data-gcf-notice role="status" hidden>
        ⚠️ Không thể cập nhật, hiển thị dữ liệu cũ
    </p>
</aside>
