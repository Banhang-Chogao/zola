<section class="mobile-search-card" aria-labelledby="mobile-search-title">
  <div class="mobile-search-card__eyebrow">TÌM KIẾM</div>
  <h2 id="mobile-search-title" class="mobile-search-card__title">Tìm kiếm trên SEOMONEY</h2>
  <p class="mobile-search-card__desc">Tìm bài viết, công cụ, hướng dẫn và ghi chú SEO bằng Google Search.</p>

  <form class="mobile-search-card__form" action="https://www.google.com/search" method="get" role="search">
    <input
      class="mobile-search-card__input"
      type="search"
      name="q"
      placeholder="Nhập từ khoá..."
      aria-label="Tìm kiếm trên SEOMONEY"
      required
    >
    <input type="hidden" name="sitesearch" value="seomoney.org">
    <button class="mobile-search-card__button" type="submit">Tìm bằng Google →</button>
  </form>
</section>
