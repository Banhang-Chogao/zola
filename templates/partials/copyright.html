{# Copyright Box

#}

    <span class="copyright__icon">©</span>
    <div class="copyright__content">
      <p class="copyright__text">
        © 2024–2026 <strong>{{ config.title }}</strong>.
        Mọi thắc mắc: <a href="mailto:contact@seomoney.org" class="copyright__link">

</section>
