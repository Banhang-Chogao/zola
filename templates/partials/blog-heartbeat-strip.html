{% set __bhb_path = current_path | default(value="/") %}
{% if __bhb_path == "/" %}
<link rel="stylesheet" href="/css/blog-heartbeat-strip.css">
<div class="bhb-strip" data-bhb-strip hidden>
  <a class="bhb-strip__inner" href="/tools/blog-heart-beat/" aria-label="Mở Blog Heart Beat dashboard">
    <span class="bhb-strip__pulse" aria-hidden="true"></span>
    <span class="bhb-strip__brand">Blog Heart Beat</span>
    <span class="bhb-strip__summary" data-bhb-strip-summary>syncing…</span>
    <span class="bhb-strip__meta" data-bhb-strip-meta>Auto-refresh 15s</span>
  </a>
</div>
<script src="/js/blog-heartbeat-strip.js" defer></script>
{% endif %}
