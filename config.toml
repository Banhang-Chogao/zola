# Zola sẽ serve tại path dưới sau khi build.
author_avatar = "https://seomoney.org/img/author-avatar.webp"
author_url    = "https://seomoney.org"
author_bio = """\
Chuyên gia SEO & Content Marketing. Người sáng lập blog Mô Hình Kiếm \
Tiền Từ Blog - nơi chia sẻ những chiến lược thực chiến về SEO, \
affiliate marketing và xây dựng thu nhập thụ động từ nội dung số. \
Với hơn 5 năm kinh nghiệm trong lĩnh vực digital marketing, tôi giúp \
hàng nghìn độc giả xây dựng thành công mô hình kinh doanh blog \
bền vững. Cùng tôi biến đam mê viết lách thành nguồn thu nhập chủ động.\
"""

# Menu navigation — CẤU TRÚC 2 TẦNG: Category → Sub-category (dropdown).
# 3 nhóm chính (Bài viết · Công cụ · Giới thiệu); mỗi nhóm có 'children'
# xổ xuống chứa các mục con → KHÔNG mục nào bị ẩn, tất cả truy cập được.
# Item KHÔNG có 'children' = link đơn bình thường (tương thích ngược).
# Thêm/bớt mục = sửa mảng 'children' tương ứng (giữ pattern url + name).
menu = [
    { name = "Trang chủ", url = "$BASE_URL/" },
    # "Bài viết" dùng MEGA MENU: 'groups' = các nhóm chuyên mục (mỗi nhóm có
    # heading + children). base.html render groups → mega menu nhiều cột (desktop)
    # / accordion (mobile). KHÔNG đổi URL category nào — chỉ nhóm lại theo biên tập
    # cho gọn (thay 1 list dọc dài). Mỗi group là 1 inline-table 1 dòng (TOML:
    # inline table không xuống dòng được). Premium tách riêng nhóm "Đặc biệt".
    { name = "Bài viết", url = "$BASE_URL/categories/tat-ca", groups = [
        { name = "Tổng quan", children = [ { url = "$BASE_URL/categories/tat-ca", name = "Tất cả bài viết" } ] },
        { name = "Chủ đề tri thức", children = [ { url = "$BASE_URL/categories/khoa-hoc", name = "Khoa học" }, { url = "$BASE_URL/categories/the-gioi", name = "Thế giới" }, { url = "$BASE_URL/categories/cong-nghe", name = "Công nghệ" } ] },
        { name = "Đời sống", children = [ { url = "$BASE_URL/categories/du-lich", name = "Du lịch" }, { url = "$BASE_URL/categories/am-thuc", name = "Ẩm thực" }, { url = "$BASE_URL/categories/the-thao", name = "Thể thao" } ] },
        { name = "Tài chính cá nhân", children = [ { url = "$BASE_URL/categories/ngan-hang", name = "Ngân hàng" }, { url = "$BASE_URL/categories/bao-hiem", name = "Bảo hiểm" } ] },
        { name = "Đặc biệt", children = [ { url = "$BASE_URL/categories/premium", name = "⭐ Premium" } ] },
    ] },
    { name = "Series", url = "$BASE_URL/series/" },
    # "Công cụ" dùng MEGA MENU: 'groups' = các nhóm (mỗi nhóm có heading + children).
    # base.html render groups → mega menu (desktop) / accordion (mobile). KHÔNG xoá/
    # đổi URL tool nào — chỉ nhóm lại cho gọn. Mỗi group là 1 inline-table 1 dòng
    # (ràng buộc TOML: inline table không xuống dòng được).
    # Refactor 27/06/2026: tách 'Dashboard' và 'Công cụ phụ' (→ 'Tiện ích') thành
    # top-level riêng để 'Công cụ' gọn hơn.
    # Deletion 30/06/2026: xoá hẳn nhóm 'Viết & biên tập' (Viết bài, Content Creator, Prompt Support).
    # TODO (AdSense Audit): hiện link tới /ad-report-v2/ (V2 daily automated report).
    # Khi /ad-report/ trở thành hub chứa cả V1/V2/V3, cập nhật menu link sang /ad-report/.
    { name = "Công cụ", url = "$BASE_URL/editor", groups = [
        { name = "SEO & phân tích", children = [ { url = "$BASE_URL/seo-bang-vang", name = "Bảng Vàng SEO" }, { url = "$BASE_URL/insights", name = "Insights" }, { url = "$BASE_URL/tools/content-direction", name = "Content Direction" }, { url = "$BASE_URL/ad-report-v2", name = "AdSense Audit" }, { url = "$BASE_URL/scoring", name = "Scoring" }, { url = "$BASE_URL/tools/theme-log", name = "Theme log" } ] },
        { name = "Hệ thống & guideline", children = [ { url = "$BASE_URL/branding-guideline", name = "Branding Guideline" }, { url = "$BASE_URL/tools/s-dna", name = "S-DNA" }, { url = "$BASE_URL/cms-v5/", name = "CMS-V5" }, { url = "$BASE_URL/font", name = "Font Guideline" } ] },
    ] },
    # "Dashboard" — top-level riêng (tách khỏi Công cụ). Dropdown đơn (children) gom
    # 4 dashboard tài chính F/L/O/H. KHÔNG đổi URL dashboard.
    { name = "Dashboard", url = "$BASE_URL/tools/f-dashboard", children = [
        { url = "$BASE_URL/tools/f-dashboard", name = "F-Dashboard" },
        { url = "$BASE_URL/tools/l-dashboard", name = "L-Dashboard" },
        { url = "$BASE_URL/tools/o-dashboard", name = "O-Dashboard" },
        { url = "$BASE_URL/tools/h-dashboard", name = "H-Dashboard" },
    ] },
    # "Tiện ích" — top-level riêng (đổi tên từ nhóm cũ 'Công cụ phụ' cho gọn navbar +
    # mobile). Dropdown đơn (children). KHÔNG đổi URL tool.
    { name = "Tiện ích", url = "$BASE_URL/converter", children = [
        { url = "$BASE_URL/converter", name = "Korean Converter" },
        { url = "$BASE_URL/changelog", name = "Changelog" },
        { url = "$BASE_URL/tools/cps", name = "Content Placement System" },
        { url = "$BASE_URL/tools/snapshot-production-v2", name = "Snapshot Production" },
    ] },
]

