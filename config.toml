base_url = "https://banhang-chogao.github.io/zola"
title = "Duy Nguyen"
description = "Blog cá nhân — viết bằng Zola"

compile_sass = true
build_search_index = false

taxonomies = [
    {name = "categories", rss = true, paginate_by = 10},
    {name = "tags", rss = true, paginate_by = 10},
]

[markdown]
external_links_class = "external"

[markdown.highlighting]
enabled = true
theme = "catppuccin-mocha"
extra_syntaxes_and_themes = ["highlight_themes"]

[extra]
author = "duynguyenlog"
tagline = "Duy Nguyen"

# Author box hiển thị cuối mỗi bài viết.
# Bio, avatar — sửa ở đây ảnh hưởng mọi bài.
# Avatar: upload file ảnh vào static/img/author-avatar.jpg trong repo,
# Zola sẽ serve tại path dưới sau khi build.
author_avatar = "https://banhang-chogao.github.io/zola/img/author-avatar.jpg"
author_url    = "https://banhang-chogao.github.io/zola"
author_bio    = """\
Mình là Duy Nguyen — một developer Việt Nam mê khám phá điểm chung giữa \
công nghệ và những chuyến đi. Tại blog này, mình ghi lại những trải nghiệm \
cá nhân về việc xây dựng các sản phẩm phần mềm: từ những dòng code đầu \
tiên, qua những đêm debug căng não, đến lúc deploy lên production và \
chứng kiến nó chạy ổn định cho hàng nghìn người dùng. Song song với đó là \
những câu chuyện trên đường — về các thành phố mình đặt chân tới, những \
quán cà phê yên tĩnh nơi mình ngồi viết code, và những con người mình tình \
cờ gặp gỡ. Mình tin rằng công nghệ và du lịch có nhiều điểm tương đồng: \
cả hai đều mở ra cánh cửa mới, đòi hỏi sự tò mò không ngừng và đôi khi \
phải chấp nhận thất bại để trưởng thành. Cảm ơn bạn đã ghé thăm — hy vọng \
chúng ta có thể đồng hành cùng nhau qua từng bài viết.\
"""

# Menu navigation. Đã bỏ 📰 BÁO CHÍ và 🎬 ĐIỆN ẢNH vì cả 2 trang fetch
# external API (RSS feeds, IMDB) gây cảm giác blog 'nặng'. Page + content
# section + JS GIỮ trong repo — chỉ ẩn khỏi nav, có thể bật lại sau.
menu = [
    {url = "$BASE_URL", name = "TRANG CHÍNH"},
    {url = "$BASE_URL/categories/posting", name = "POSTING"},
    {url = "$BASE_URL/editor", name = "✎ VIẾT BÀI"},
    {url = "$BASE_URL/du-lich", name = "✈️ DU LỊCH"},
    {url = "$BASE_URL/converter", name = "한 KOREAN CONVERTER"},
    {url = "$BASE_URL/changelog", name = "✓ CHANGELOG"},
    {url = "$BASE_URL/insights", name = "📊 INSIGHTS"},
    {url = "$BASE_URL/about", name = "GIỚI THIỆU"},
]

# Google Analytics 4 Measurement ID — để trống nếu chưa setup.
# Khi có, GA tracking script sẽ tự load trên mọi page.
ga_measurement_id = "G-K9DXHPPGGR"

# ============= GISCUS COMMENTS (GitHub Discussions) =============
# Setup:
#   1. Settings → Features → bật Discussions cho repo
#   2. Install app https://github.com/apps/giscus
#   3. Vào https://giscus.app → chọn repo Banhang-Chogao/zola
#      → copy 2 ID dán vào dưới
# Để trống repo_id hoặc category_id = macro silent skip, không render comment box.
[extra.giscus]
repo        = "Banhang-Chogao/zola"
repo_id     = ""
category    = "General"
category_id = ""

# Visitor counter backend URL — để trống cho đến khi deploy
# services/visitor-counter/ lên Render hoặc Railway. Khi có URL,
# meta tag + script + footer span sẽ tự bật. Xem
# services/visitor-counter/README.md để deploy.
visitor_api_url = "https://blog-visitor-api.onrender.com"

# CMS auth backend URL — nếu deploy auth tách khỏi visitor counter.
# Để trống = reuse visitor_api_url (cùng service FastAPI mở rộng).
cms_auth_url = ""
