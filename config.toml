# VIPZone auth backend — FastAPI OAuth on Render.
# PHẢI nằm dưới [extra], KHÔNG đặt trong [extra.giscus] (meta vipzone-auth-api sẽ không render).
cms_auth_url = "https://blog-vipzone-api.onrender.com"
# Google Search Console (SEO Reality Check): OAuth + live metrics qua VIPZone auth /gsc/*.
# Property cố định: sc-domain:seomoney.org (DOMAIN property — phủ http/https + mọi
# subdomain/path). Deploy preflight (scripts/gsc_preflight.py, gate trong deploy.yml)
# BẮT BUỘC secret GSC_PROPERTY_URL == "sc-domain:seomoney.org"; sai/thiếu → deploy FAIL.
# Sitemap: https://seomoney.org/sitemap.xml
# Setup: Google Cloud OAuth → redirect https://blog-vipzone-api.onrender.com/gsc/oauth/callback
# → Render env GSC_CLIENT_ID + GSC_CLIENT_SECRET → đăng nhập CMS → Kết nối GSC.
# CI snapshot secrets: GSC_REFRESH_TOKEN, GSC_PROPERTY_URL=sc-domain:seomoney.org, GSC_CLIENT_ID, GSC_CLIENT_SECRET.

# Paywall API — FastAPI backend (request/unlock/admin). Để trống = UI hiện nhưng fetch fail.
paywall_api_url = "https://blog-paywall-api.onrender.com"
