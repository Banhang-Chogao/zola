        { url = "$BASE_URL/categories/bao-hiem",  name = "Bảo hiểm" },
        { url = "$BASE_URL/categories/premium",   name = "⭐ Premium" },
    ] },
    # Công cụ — 4 NHÓM con (accordion): Content · Dashboard · DB2 · Khác.
    # Mỗi nhóm có 'children' riêng → submenu chỉ hiện tên nhóm ở tầng 1, mỗi
    # nhóm xổ/đóng để lộ tool con (không tràn màn hình, nhất là mobile).
    # Thêm tool mới = thêm 1 dòng vào 'children' của nhóm phù hợp (giữ pattern).
    { name = "Công cụ", url = "$BASE_URL/editor", children = [
        { name = "Content", children = [
