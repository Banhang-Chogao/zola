base_url = "https://banhang-chogao.github.io/zola"
title = "Duy Nguyen"
description = "Blog cá nhân của Duy Nguyen về công nghệ, du lịch và ẩm thực — chuyện viết code, xây dựng sản phẩm phần mềm và những chuyến đi đáng nhớ."
# Blog tiếng Việt → khai báo để feed (atom/rss) + sitemap mang đúng
# xml:lang="vi" thay vì mặc định "en", khớp <html lang="vi">.
default_language = "vi"

compile_sass = true
build_search_index = false

# SEO: sinh feed RSS/Atom toàn site + cho từng taxonomy.
# Zola 0.19+ đổi `generate_rss`→`generate_feeds`, taxonomy `rss`→`feed`.
# Mặc định generate_feeds=false → trước đây blog KHÔNG có feed nào (chỉ có
# sitemap.xml). Bật lên để feed reader + Google Discover bắt được nội dung.
generate_feeds = true
feed_filenames = ["atom.xml", "rss.xml"]

taxonomies = [
    {name = "categories", feed = true, paginate_by = 10},
    {name = "tags", feed = true, paginate_by = 10},
]

[markdown]
external_links_class = "external"

[markdown.highlighting]
enabled = true
theme = "catppuccin-mocha"
extra_syntaxes_and_themes = ["highlight_themes"]

[extra]
author = "duynguyenlog"
tagline = "Duy Nguyen"

# Author box hiển thị cuối mỗi bài viết.
# Bio, avatar — sửa ở đây ảnh hưởng mọi bài.
# Avatar: upload file ảnh vào static/img/author-avatar.jpg trong repo,
# Zola sẽ serve tại path dưới sau khi build.
author_avatar = "https://banhang-chogao.github.io/zola/img/author-avatar.jpg"
author_url    = "https://banhang-chogao.github.io/zola"
author_bio    = """\
Mình là Duy Nguyen — một developer Việt Nam mê khám phá điểm chung giữa \
công nghệ và những chuyến đi. Tại blog này, mình ghi lại những trải nghiệm \
cá nhân về việc xây dựng các sản phẩm phần mềm: từ những dòng code đầu \
tiên, qua những đêm debug căng não, đến lúc deploy lên production và \
chứng kiến nó chạy ổn định cho hàng nghìn người dùng. Song song với đó là \
những câu chuyện trên đường — về các thành phố mình đặt chân tới, những \
quán cà phê yên tĩnh nơi mình ngồi viết code, và những con người mình tình \
cờ gặp gỡ. Mình tin rằng công nghệ và du lịch có nhiều điểm tương đồng: \
cả hai đều mở ra cánh cửa mới, đòi hỏi sự tò mò không ngừng và đôi khi \
phải chấp nhận thất bại để trưởng thành. Cảm ơn bạn đã ghé thăm — hy vọng \
chúng ta có thể đồng hành cùng nhau qua từng bài viết.\
"""

# Menu navigation — CẤU TRÚC 2 TẦNG: Category → Sub-category (dropdown).
# 3 nhóm chính (Bài viết · Công cụ · Giới thiệu); mỗi nhóm có 'children'
# xổ xuống chứa các mục con → KHÔNG mục nào bị ẩn, tất cả truy cập được.
# Item KHÔNG có 'children' = link đơn bình thường (tương thích ngược).
# Thêm/bớt mục = sửa mảng 'children' tương ứng (giữ pattern url + name).
menu = [
    { name = "Trang chủ", url = "$BASE_URL/" },
    { name = "Bài viết", url = "$BASE_URL/categories/posting", children = [
        { url = "$BASE_URL/categories/posting",  name = "Tất cả bài viết" },
        { url = "$BASE_URL/categories/du-lich",  name = "Du lịch" },
        { url = "$BASE_URL/categories/cong-nghe", name = "Công nghệ" },
        { url = "$BASE_URL/categories/am-thuc",  name = "Ẩm thực" },
        { url = "$BASE_URL/categories/ngan-hang",  name = "Ngân hàng" },
    ] },
    { name = "Công cụ", url = "$BASE_URL/editor", children = [
        { url = "$BASE_URL/editor",    name = "Viết bài" },
        { url = "$BASE_URL/converter", name = "Korean Converter" },
        { url = "$BASE_URL/changelog", name = "Changelog" },
        { url = "$BASE_URL/insights",  name = "Insights" },
        { url = "$BASE_URL/scoring",   name = "Scoring" },
        { url = "$BASE_URL/branding",  name = "BrandingX" },
        { url = "$BASE_URL/font",      name = "Font Guideline" },
    ] },
    { name = "Giới thiệu", url = "$BASE_URL/about", children = [
        { url = "$BASE_URL/about",            name = "Giới thiệu" },
        { url = "$BASE_URL/bao-cao-tong-ket", name = "Báo cáo tổng kết" },
    ] },
]

