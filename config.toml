base_url = "https://seomoney.org"
theme = "zulma"
title = "SEOMONEY"

# Theme system: E-DNA (Enterprise Editorial Design System) is the default visual theme
# Applied via CSS custom properties (--c-*) + SCSS theme overrides in sass/_themes.scss
# Users can toggle via theme switcher (requires data-theme attribute on :root)
description = "SEOMONEY — blog về SEO, công nghệ, du lịch và tài chính cá nhân: chuyện viết code, xây dựng sản phẩm phần mềm và những chuyến đi đáng nhớ. Tác giả: Duy Nguyen."
default_language = "vi"
author = "duynguyenlog"

compile_sass = true
build_search_index = false

generate_feeds = true
feed_filenames = ["atom.xml", "rss.xml"]

taxonomies = [
    {name = "categories", feed = true, paginate_by = 10},
    {name = "tags", feed = false, paginate_by = 10},
]

[markdown]
external_links_class = "external"

[markdown.highlighting]
enabled = true
theme = "catppuccin-mocha"
extra_syntaxes_and_themes = ["highlight_themes"]

[extra]
# Zulma theme configuration
show_menu = true
enable_search = true
theme_mode = "darkly"
allow_theme_toggle = true

author = "duynguyenlog"
tagline = "SEO · Công nghệ · Tài chính cá nhân"

enable_qa_dashboard = false
deployment_status_path = "data/deployment-status.json"

author_avatar = "https://seomoney.org/img/author-avatar.webp"
author_url = "https://seomoney.org"
author_bio = """\
Mình là Duy Nguyen — một developer Việt Nam mê khám phá điểm chung giữa \
công nghệ và những chuyến đi. Tại blog này, mình ghi lại những trải nghiệm \
cá nhân về việc xây dựng các sản phẩm phần mềm: từ những dòng code đầu \
tiên, qua những đêm debug căng não, đến lúc deploy lên production và \
chứng kiến nó chạy ổn định cho hàng nghìn người dùng. Song song với đó là \
những câu chuyện trên đường — về các thành phố mình đặt chân tới, những \
quán cà phê yên tĩnh nơi mình ngồi viết code, và những con người mình tình \
cờ gặp gỡ. Mình tin rằng công nghệ và du lịch có nhiều điểm tương đồng: \
cả hai đều mở ra cánh cửa mới, đòi hỏi sự tò mò không ngừng và đôi khi \
phải chấp nhận thất bại để trưởng thành. Cảm ơn bạn đã ghé thăm — hy vọng \
chúng ta có thể đồng hành cùng nhau qua từng bài viết.\
"""

