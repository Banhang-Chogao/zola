#   2. Chọn phương thức "HTML tag" để lấy meta tag này cho blog.
#   3. Copy phần content="..." rồi dán giá trị vào dưới.
# Để trống = không render meta (silent skip).
google_site_verification = "P8D-DHMtUivdNJmeBe9y345PxmIfmIGooscim9x7IM4"

