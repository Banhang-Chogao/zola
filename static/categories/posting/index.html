<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>Đã chuyển — Tất cả bài viết</title>
  <!-- Category "Posting" đã đổi tên thành "Tất cả" (slug tat-ca). URL cũ
       /categories/posting/ được redirect sang /categories/tat-ca/ để không
       404 với bookmark/Google index cũ. canonical + noindex để Google gộp
       tín hiệu về trang mới. -->
  <link rel="canonical" href="https://banhang-chogao.github.io/zola/categories/tat-ca/">
  <meta name="robots" content="noindex, follow">
  <meta http-equiv="refresh" content="0; url=https://banhang-chogao.github.io/zola/categories/tat-ca/">
  <script>location.replace("https://banhang-chogao.github.io/zola/categories/tat-ca/");</script>
</head>
<body>
  <p>Trang đã chuyển tới <a href="https://banhang-chogao.github.io/zola/categories/tat-ca/">Tất cả bài viết</a>.</p>
</body>
</html>
