# =================================================================
# Decap CMS configuration — Duy Nguyen blog (Zola + GitHub Pages)
# Docs: https://decapcms.org/docs/configuration-options/
# =================================================================

backend:
  name: github
  repo: Banhang-Chogao/zola
  branch: main
  # === OAUTH PROXY ===
  # GitHub Pages KHÔNG có backend → Decap CMS cần OAuth proxy để đổi code lấy token.
  # Sửa 2 dòng dưới sau khi deploy proxy:
  #   base_url: https://your-oauth-proxy.example.com
  #   auth_endpoint: auth
  # Xem hướng dẫn deploy proxy bên dưới phần "Hướng dẫn cài OAuth proxy".

# Bật editorial workflow: bài viết qua trạng thái Draft → In Review → Ready → Published
# Mỗi action sẽ tạo PR/commit trên GitHub
publish_mode: editorial_workflow

# Nơi lưu media upload từ CMS
media_folder: "static/img/uploads"
public_folder: "/img/uploads"

# Hiển thị tiếng Việt
locale: vi

# Logo trên trang admin
site_url: https://banhang-chogao.github.io/zola
display_url: https://banhang-chogao.github.io/zola
logo_url: https://banhang-chogao.github.io/zola/favicon.ico

# =================================================================
# Collections — map đến cấu trúc content/ của Zola
# =================================================================
collections:

  # -----------------------------------------------------------------
  # 1. Bài viết blog (root content/*.md)
  # -----------------------------------------------------------------
  - name: "blog"
    label: "Bài viết blog"
    label_singular: "bài viết"
    description: "Bài viết hiển thị ở trang chủ. Mỗi bài tạo file content/{slug}.md"
    folder: "content"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{title}} · {{date | date('DD/MM/YYYY')}}"
    extension: "md"
    format: "toml-frontmatter"
    # Loại trừ file _index.md và folder con (chỉ lấy bài viết ở root)
    filter:
      field: "title"
    fields:
      - {label: "Tiêu đề", name: "title", widget: "string"}
      - {label: "Ngày đăng", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false}

      - label: "Phân loại"
        name: "taxonomies"
        widget: "object"
        fields:
          - {label: "Categories", name: "categories", widget: "list", default: ["Posting"], hint: "Mỗi category là 1 mục"}
          - {label: "Tags", name: "tags", widget: "list", default: [], required: false, hint: "Mỗi tag là 1 mục"}

      - label: "Tuỳ chọn thêm"
        name: "extra"
        widget: "object"
        required: false
        fields:
          - {label: "Ảnh thumbnail", name: "thumbnail", widget: "image", required: false, hint: "URL hoặc upload"}
          - {label: "Bài nổi bật?", name: "featured", widget: "boolean", default: false, required: false, hint: "Tick để bài lên Featured Post"}

      - {label: "Nội dung", name: "body", widget: "markdown"}

  # -----------------------------------------------------------------
  # 2. Trang tĩnh (content/pages/*.md) — VD About, Contact
  # -----------------------------------------------------------------
  - name: "pages"
    label: "Trang tĩnh"
    label_singular: "trang"
    description: "Các trang không phải bài viết: Giới thiệu, Liên hệ..."
    folder: "content/pages"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "toml-frontmatter"
    fields:
      - {label: "Tiêu đề", name: "title", widget: "string"}
      - {label: "Đường dẫn", name: "path", widget: "string", hint: "Ví dụ: about → /about/"}
      - {label: "Template", name: "template", widget: "select", options: ["about.html", "page.html"], default: "about.html"}
      - {label: "Nội dung", name: "body", widget: "markdown"}

  # -----------------------------------------------------------------
  # 3. Cấu hình hệ thống (single files)
  # -----------------------------------------------------------------
  - name: "config"
    label: "Cấu hình"
    delete: false
    editor:
      preview: false
    files:

      - name: "home-section"
        label: "Trang chủ — Pagination"
        file: "content/_index.md"
        format: "toml-frontmatter"
        fields:
          - {label: "Số bài/trang", name: "paginate_by", widget: "number", default: 10, min: 1, max: 50}
          - {label: "Sắp xếp", name: "sort_by", widget: "select", options: ["date", "weight", "title"], default: "date"}
          - {label: "Template", name: "template", widget: "hidden", default: "index.html"}
          - {label: "Mô tả", name: "body", widget: "markdown", required: false}

      - name: "doc-bao-section"
        label: "Trang Đọc báo"
        file: "content/doc-bao/_index.md"
        format: "toml-frontmatter"
        fields:
          - {label: "Tiêu đề", name: "title", widget: "string"}
          - {label: "Sắp xếp", name: "sort_by", widget: "string", default: "date"}
          - {label: "Template", name: "template", widget: "hidden", default: "doc-bao.html"}
