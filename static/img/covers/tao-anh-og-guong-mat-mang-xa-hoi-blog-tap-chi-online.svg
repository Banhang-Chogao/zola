<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Tạo ảnh OG: gương mặt trên mạng xã hội của blog và tạp chí online">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Nền tối + hình nền mờ (thumbnail/background ở opacity thấp) -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1050" cy="150" r="300" fill="#e30613" opacity="0.10"/>
  <circle cx="1130" cy="520" r="170" fill="#ffffff" opacity="0.05"/>

  <!-- Khung "social card" mờ phía sau, gợi ý một bản preview trên MXH -->
  <g opacity="0.07">
    <rect x="812" y="118" rx="20" ry="20" width="312" height="214" fill="#ffffff"/>
    <rect x="844" y="150" width="248" height="96" rx="10" fill="#ffffff"/>
    <rect x="844" y="262" width="230" height="16" rx="8" fill="#ffffff"/>
    <rect x="844" y="292" width="170" height="16" rx="8" fill="#ffffff"/>
  </g>

  <!-- Category chip -->
  <rect x="80" y="84" rx="22" ry="22" width="232" height="52" fill="#e30613"/>
  <text x="104" y="119" font-family="'Be Vietnam Pro','Noto Sans','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="24" font-weight="700" fill="#ffffff" letter-spacing="3">CÔNG NGHỆ</text>

  <!-- Headline lớn, dễ đọc, ưu tiên trước nhất -->
  <text font-family="'Be Vietnam Pro','Noto Sans','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="68" font-weight="800" fill="#ffffff">
    <tspan x="80" y="252">Tạo ảnh OG:</tspan>
    <tspan x="80" y="338">gương mặt trên</tspan>
    <tspan x="80" y="424">mạng xã hội của blog</tspan>
  </text>

  <!-- Gạch nhấn đỏ -->
  <rect x="84" y="468" width="120" height="8" rx="4" fill="#e30613"/>

  <!-- Bottom bar đặc CTA Red + brand lockup -->
  <rect x="0" y="558" width="1200" height="72" fill="#e30613"/>
  <text x="80" y="603" font-family="'Be Vietnam Pro','Noto Sans','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="30" font-weight="800" fill="#ffffff" letter-spacing="2">SEOMONEY</text>
  <text x="1120" y="603" text-anchor="end" font-family="'Be Vietnam Pro','Noto Sans','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="24" font-weight="600" fill="#ffffff" opacity="0.92">seomoney.org</text>
</svg>
