<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="SEOMONEY — SEO, Công nghệ, Tài chính cá nhân">
  <defs>
    <!-- Legal, Vietnamese-capable, Google Sans-style font fallback chain.
         Be Vietnam Pro / Roboto / Noto Sans are free (OFL/Apache) and cover
         Vietnamese diacritics; "Google Sans"/"Product Sans" only render when
         legally installed, else fall back cleanly. -->
    <style>
      text { font-family: "Be Vietnam Pro", "Google Sans", "Product Sans", Roboto, "Noto Sans", "Segoe UI", Arial, Helvetica, sans-serif; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.5" stop-color="#16243d"/>
      <stop offset="1" stop-color="#0b3a6f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- base -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- ambient depth: low-opacity wordmark + soft accent orbs -->
  <text x="600" y="438" text-anchor="middle" font-weight="800" font-size="316"
        fill="#ffffff" opacity="0.035" letter-spacing="8">SEOMONEY</text>
  <circle cx="1092" cy="104" r="240" fill="#38bdf8" opacity="0.07"/>
  <circle cx="96" cy="556" r="190" fill="#2dd4bf" opacity="0.05"/>

  <!-- top bar: logo + brand on the left, tagline on the right -->
  <g transform="translate(72,72)">
    <rect x="0" y="-4" width="48" height="48" rx="13" fill="url(#accent)"/>
    <rect x="0" y="-4" width="48" height="48" rx="13" fill="url(#sheen)"/>
    <text x="24" y="29" text-anchor="middle" font-weight="800" font-size="28" fill="#0b1220">S</text>
    <text x="66" y="31" font-weight="800" font-size="32" fill="#ffffff" letter-spacing="2.5">SEOMONEY</text>
  </g>
  <text x="1128" y="103" text-anchor="end" font-weight="600" font-size="21"
        fill="#9cc4f4" letter-spacing="0.5">SEO · Công nghệ · Tài chính cá nhân</text>
  <rect x="72" y="140" width="1056" height="2" rx="1" fill="#ffffff" opacity="0.12"/>

  <!-- article preview card (centered in the safe zone) -->
  <g transform="translate(72,180)">
    <rect x="0" y="0" width="1056" height="304" rx="24" fill="#ffffff" opacity="0.06"/>
    <rect x="0.5" y="0.5" width="1055" height="303" rx="23.5" fill="url(#sheen)"/>
    <rect x="0.5" y="0.5" width="1055" height="303" rx="23.5" fill="none" stroke="#ffffff" stroke-opacity="0.14"/>

    <!-- thumbnail slot -->
    <rect x="40" y="40" width="300" height="224" rx="18" fill="url(#accent)"/>
    <rect x="40" y="40" width="300" height="224" rx="18" fill="url(#sheen)"/>
    <text x="190" y="166" text-anchor="middle" font-weight="800" font-size="60"
          fill="#0b1220" opacity="0.55">S</text>

    <!-- title placeholder lines -->
    <rect x="384" y="62" width="608" height="28" rx="9" fill="#ffffff" opacity="0.88"/>
    <rect x="384" y="110" width="512" height="28" rx="9" fill="#ffffff" opacity="0.60"/>
    <rect x="384" y="168" width="168" height="14" rx="7" fill="url(#accent)" opacity="0.85"/>
    <text x="384" y="250" font-weight="600" font-size="21" fill="#cbd5e1">seomoney.org · bài viết mới</text>
  </g>

  <!-- footer credit -->
  <text x="72" y="558" font-weight="500" font-size="18" fill="#94a3b8">Tác giả: Duy Nguyen</text>
  <text x="1128" y="558" text-anchor="end" font-weight="600" font-size="18"
        fill="#7dd3fc" letter-spacing="0.5">seomoney.org</text>
</svg>
