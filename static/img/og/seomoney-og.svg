<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="SEOMONEY — SEO, Công nghệ, Tài chính cá nhân">
  <defs>
    <!-- Vietnamese-capable, legally-free font fallback chain. "Google Sans"/
         "Product Sans" only render where legally installed; otherwise the card
         degrades cleanly to Be Vietnam Pro / Roboto / Noto Sans / DejaVu Sans,
         all of which cover Vietnamese diacritics. -->
    <style>
      text { font-family: "Be Vietnam Pro", "Google Sans", "Product Sans", Roboto, "Noto Sans", "DejaVu Sans", "Segoe UI", Arial, Helvetica, sans-serif; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070d1a"/>
      <stop offset="0.55" stop-color="#0c1a30"/>
      <stop offset="1" stop-color="#0a3a66"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>

  <!-- base -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- ambient depth: soft accent orbs + faint wordmark -->
  <circle cx="1070" cy="86" r="240" fill="#38bdf8" opacity="0.09"/>
  <circle cx="92" cy="470" r="160" fill="#2dd4bf" opacity="0.06"/>
  <text x="600" y="452" text-anchor="middle" font-weight="800" font-size="290"
        fill="#ffffff" opacity="0.028" letter-spacing="4">SEOMONEY</text>

  <!-- top bar: brand lockup (left) + tagline (right) -->
  <g transform="translate(72,62)">
    <rect width="64" height="64" rx="18" fill="#0f172a"/>
    <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="17.25" fill="none" stroke="#38bdf8" stroke-opacity="0.45" stroke-width="1.5"/>
    <path d="M18 38c5 5 23 5 28 0M20 26c4-7 20-7 24 0" fill="none" stroke="#38bdf8" stroke-width="5" stroke-linecap="round"/>
    <circle cx="24" cy="31" r="3" fill="#f8fafc"/>
    <circle cx="40" cy="31" r="3" fill="#f8fafc"/>
  </g>
  <text x="152" y="106" font-weight="800" font-size="34" fill="#ffffff" letter-spacing="1.5">SEOMONEY</text>
  <text x="1128" y="104" text-anchor="end" font-weight="600" font-size="22"
        fill="#8fbce8" letter-spacing="0.4">SEO · Công nghệ · Tài chính cá nhân</text>
  <rect x="72" y="150" width="1056" height="2" rx="1" fill="#ffffff" opacity="0.10"/>

  <!-- eyebrow / kicker -->
  <rect x="72" y="212" width="46" height="9" rx="4.5" fill="url(#accent)"/>
  <text x="132" y="222" font-weight="700" font-size="24" fill="#38bdf8" letter-spacing="2">KIẾN THỨC · TRẢI NGHIỆM · TĂNG TRƯỞNG</text>

  <!-- headline (strong hierarchy, big readable type) -->
  <text x="70" y="322" font-weight="800" font-size="76" fill="#f8fafc">Học thật, làm thật,</text>
  <text x="70" y="410" font-weight="800" font-size="76" fill="url(#accent)">tăng trưởng bền vững.</text>
  <text x="72" y="470" font-weight="500" font-size="27" fill="#cbd5e1">Viết code · xây sản phẩm · và những chuyến đi đáng nhớ.</text>

  <!-- bottom brand bar (full-bleed, news-style) -->
  <rect x="0" y="534" width="1200" height="96" fill="#0a1120"/>
  <rect x="0" y="534" width="1200" height="4" fill="url(#accent)"/>
  <g transform="translate(72,560) scale(0.6875)">
    <rect width="64" height="64" rx="18" fill="#0f172a"/>
    <path d="M18 38c5 5 23 5 28 0M20 26c4-7 20-7 24 0" fill="none" stroke="#38bdf8" stroke-width="5" stroke-linecap="round"/>
    <circle cx="24" cy="31" r="3" fill="#f8fafc"/>
    <circle cx="40" cy="31" r="3" fill="#f8fafc"/>
  </g>
  <text x="130" y="592" font-weight="700" font-size="30" fill="#f8fafc" letter-spacing="0.3">seomoney.org</text>
  <text x="1128" y="590" text-anchor="end" font-weight="600" font-size="24"
        fill="#9cc4f4" letter-spacing="0.3">Tác giả: Duy Nguyen</text>
</svg>
