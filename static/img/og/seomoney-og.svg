<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="SEOMONEY — SEO, Cong nghe, Tai chinh ca nhan">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0b3a6f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>

  <!-- base -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- background SEOMONEY motif (layered low-opacity typography) -->
  <text x="600" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-weight="800" font-size="320" fill="#ffffff" opacity="0.04"
        letter-spacing="6">SEOMONEY</text>
  <circle cx="1080" cy="120" r="220" fill="#38bdf8" opacity="0.06"/>
  <circle cx="120" cy="540" r="180" fill="#2dd4bf" opacity="0.05"/>

  <!-- top bar: left = logo + brand, right = tagline -->
  <g transform="translate(72,76)">
    <rect x="0" y="-2" width="44" height="44" rx="11" fill="url(#accent)"/>
    <text x="22" y="30" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-weight="800" font-size="26" fill="#0f172a">S</text>
    <text x="62" y="30" font-family="Arial, Helvetica, sans-serif" font-weight="800"
          font-size="30" fill="#ffffff" letter-spacing="2">SEOMONEY</text>
  </g>
  <text x="1128" y="106" text-anchor="end" font-family="Arial, Helvetica, sans-serif"
        font-weight="600" font-size="20" fill="#93c5fd" letter-spacing="1">SEO · Công nghệ · Tài chính cá nhân</text>
  <rect x="72" y="138" width="1056" height="2" fill="#ffffff" opacity="0.12"/>

  <!-- article preview card (safe zone, centered) -->
  <g transform="translate(72,182)">
    <rect x="0" y="0" width="1056" height="300" rx="22" fill="#ffffff" opacity="0.06"/>
    <rect x="0" y="0" width="1056" height="300" rx="22" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>
    <!-- thumbnail slot -->
    <rect x="36" y="36" width="300" height="228" rx="16" fill="url(#accent)" opacity="0.85"/>
    <text x="186" y="160" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-weight="800" font-size="56" fill="#0f172a" opacity="0.55">S</text>
    <!-- title lines -->
    <rect x="384" y="58" width="600" height="26" rx="8" fill="#ffffff" opacity="0.85"/>
    <rect x="384" y="104" width="520" height="26" rx="8" fill="#ffffff" opacity="0.6"/>
    <rect x="384" y="160" width="360" height="18" rx="7" fill="#93c5fd" opacity="0.7"/>
    <text x="384" y="248" font-family="Arial, Helvetica, sans-serif" font-weight="600"
          font-size="20" fill="#cbd5e1">seomoney.org · bài viết mới</text>
  </g>

  <!-- footer credit -->
  <text x="72" y="556" font-family="Arial, Helvetica, sans-serif" font-weight="500"
        font-size="18" fill="#94a3b8">Tác giả: Duy Nguyen</text>
</svg>
