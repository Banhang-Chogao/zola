    <text x="180" y="168" font-family="Arial, sans-serif" font-weight="bold" font-size="18" fill="#1B5E20" text-anchor="middle">KHÍ NHÀ KÍNH</text>

    <text x="180" y="205" font-family="Arial, sans-serif" font-size="14" fill="#444" text-anchor="middle">Theo dõi dấu chân carbon (CO₂)</text>
    <text x="180" y="225" font-family="Arial, sans-serif" font-size="14" fill="#444" text-anchor="middle">trên mọi giao dịch.</text>

    <rect x="100" y="245" width="160" height="40" rx="8" fill="#E8F5E9"/>
